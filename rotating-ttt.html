<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotating Tic Tac Toe | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #020617; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; user-select: none; text-align: center; }
        #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 40%, #1e3a8a44 0%, transparent 70%); z-index: 0; pointer-events: none; }
        .back-home { position: fixed; top: 20px; left: 24px; font-size: 0.85rem; color: #475569; text-decoration: none; z-index: 10; }
        .back-home:hover { color: #fff; }
        .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; }

        h1 { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem,7vw,2.8rem); font-weight: 900; margin: 0 0 4px; letter-spacing: -2px; }
        .subtitle { font-size: 0.9rem; color: #64748b; margin-bottom: 24px; }

        .stats-row { display: flex; gap: 24px; margin-bottom: 20px; }
        .stat { display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .stat-val { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 900; }
        .stat-val.x { color: #60a5fa; }
        .stat-val.o { color: #f87171; }
        .stat-val.d { color: #94a3b8; }
        .stat-label { font-size: 0.7rem; color: #475569; text-transform: uppercase; letter-spacing: 1.5px; }

        /* turn indicator */
        .turn-indicator {
            font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
            margin-bottom: 16px; min-height: 24px; transition: color 0.3s;
        }
        .turn-indicator.x { color: #60a5fa; }
        .turn-indicator.o { color: #f87171; }

        /* rotation warning */
        .rot-warn {
            font-size: 0.8rem; color: #fbbf24; min-height: 20px;
            margin-bottom: 12px; transition: opacity 0.3s;
        }

        /* board wrapper — rotates */
        .board-wrap {
            position: relative;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 270px;
        }

        .cell {
            width: 82px; height: 82px;
            background: rgba(15,23,42,0.7);
            border: 1.5px solid rgba(51,65,85,0.7);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 900;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
        }
        .cell:hover:not(.taken) { background: rgba(30,58,138,0.35); border-color: rgba(96,165,250,0.4); transform: scale(1.05); }
        .cell.taken { cursor: default; }
        .cell.x { color: #60a5fa; }
        .cell.o { color: #f87171; }
        .cell.win { background: rgba(251,191,36,0.15); border-color: #fbbf24; animation: cellPop 0.4s ease; }
        @keyframes cellPop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

        .action-row { display: flex; gap: 12px; margin-top: 20px; }
        .action-btn { padding: 10px 24px; background: rgba(15,23,42,0.7); border: 1px solid rgba(51,65,85,0.6); border-radius: 999px; color: #94a3b8; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .action-btn:hover { background: rgba(30,58,138,0.4); color: #fff; border-color: rgba(96,165,250,0.3); }

        /* result overlay */
        .result-overlay { position: fixed; inset: 0; background: rgba(2,6,23,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .result-overlay.show { opacity: 1; pointer-events: all; }
        .res-emoji { font-size: 4rem; margin-bottom: 12px; }
        .res-title { font-family: 'Syne', sans-serif; font-size: clamp(2rem,8vw,3rem); font-weight: 900; margin: 0 0 8px; }
        .res-sub { color: #64748b; font-size: 0.95rem; margin-bottom: 24px; }
        .res-btn { padding: 13px 36px; background: rgba(37,99,235,0.3); border: 1.5px solid rgba(96,165,250,0.45); border-radius: 999px; color: #fff; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .res-btn:hover { background: rgba(37,99,235,0.5); }

        .vs-badge { font-size: 0.75rem; color: #334155; margin-bottom: 16px; }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="bg-glow"></div>
<a href="index.html" class="back-home">← Back to tyler.fun</a>

<div class="result-overlay" id="resultOverlay">
    <div class="res-emoji" id="resEmoji">🎉</div>
    <div class="res-title" id="resTitle">X wins!</div>
    <div class="res-sub" id="resSub">The board rotated 0 times.</div>
    <button class="res-btn" onclick="newGame()">Play again</button>
</div>

<div class="container">
    <h1>Rotating Tic Tac Toe</h1>
    <p class="subtitle">Every 2 turns, the board rotates 90°. Adapt or lose.</p>

    <div class="stats-row">
        <div class="stat"><div class="stat-val x" id="xWins">0</div><div class="stat-label">X wins</div></div>
        <div class="stat"><div class="stat-val d" id="draws">0</div><div class="stat-label">Draws</div></div>
        <div class="stat"><div class="stat-val o" id="oWins">0</div><div class="stat-label">O wins</div></div>
    </div>

    <div class="vs-badge">2 players · same device</div>
    <div class="turn-indicator x" id="turnIndicator">X's turn</div>
    <div class="rot-warn" id="rotWarn"></div>

    <div class="board-wrap" id="boardWrap">
        <div class="board" id="board"></div>
    </div>

    <div class="action-row">
        <button class="action-btn" onclick="newGame()">🔄 New game</button>
        <button class="action-btn" onclick="resetScore()">Reset scores</button>
    </div>
</div>

<script>
let board = Array(9).fill(null);
let currentPlayer = 'X';
let turn = 0, rotations = 0;
let scores = { X: 0, O: 0, D: 0 };
let gameOver = false;
const ROTATE_EVERY = 2;

const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8], // rows
    [0,3,6],[1,4,7],[2,5,8], // cols
    [0,4,8],[2,4,6]           // diags
];

function newGame() {
    board = Array(9).fill(null);
    currentPlayer = 'X';
    turn = 0; rotations = 0; gameOver = false;
    document.getElementById('resultOverlay').classList.remove('show');
    document.getElementById('boardWrap').style.transform = 'rotate(0deg)';
    updateTurn();
    updateRotWarn();
    renderBoard();
}

function resetScore() { scores = {X:0,O:0,D:0}; updateScores(); }

function cellClick(idx) {
    if (gameOver || board[idx]) return;
    board[idx] = currentPlayer;
    turn++;
    renderBoard();

    const winner = checkWinner();
    if (winner) { endGame(winner); return; }
    if (board.every(c => c)) { endGame(null); return; }

    // rotate every N turns
    if (turn % ROTATE_EVERY === 0) {
        rotateBoard();
        rotations++;
        document.getElementById('boardWrap').style.transform = `rotate(${rotations * 90}deg)`;
    }

    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    updateTurn();
    updateRotWarn();
}

function rotateBoard() {
    // rotate the logical board 90° clockwise
    // 0 1 2      6 3 0
    // 3 4 5  ->  7 4 1
    // 6 7 8      8 5 2
    const old = [...board];
    board[0]=old[6]; board[1]=old[3]; board[2]=old[0];
    board[3]=old[7]; board[4]=old[4]; board[5]=old[1];
    board[6]=old[8]; board[7]=old[5]; board[8]=old[2];
}

function checkWinner() {
    for (const [a,b,c] of WIN_LINES) {
        if (board[a] && board[a]===board[b] && board[b]===board[c]) {
            return { player: board[a], line: [a,b,c] };
        }
    }
    return null;
}

function endGame(winner) {
    gameOver = true;
    if (winner) {
        scores[winner.player]++;
        document.getElementById('resEmoji').textContent = winner.player === 'X' ? '🔵' : '🔴';
        document.getElementById('resTitle').textContent = `${winner.player} wins!`;
        // highlight winning cells
        winner.line.forEach(i => document.querySelectorAll('.cell')[i].classList.add('win'));
    } else {
        scores.D++;
        document.getElementById('resEmoji').textContent = '🤝';
        document.getElementById('resTitle').textContent = 'Draw!';
    }
    document.getElementById('resSub').textContent = `The board rotated ${rotations} time${rotations===1?'':'s'}.`;
    updateScores();
    setTimeout(() => document.getElementById('resultOverlay').classList.add('show'), 600);
}

function renderBoard() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` taken ${val.toLowerCase()}` : '');
        cell.textContent = val || '';
        cell.onclick = () => cellClick(i);
        el.appendChild(cell);
    });
}

function updateTurn() {
    const el = document.getElementById('turnIndicator');
    el.textContent = `${currentPlayer}'s turn`;
    el.className = 'turn-indicator ' + currentPlayer.toLowerCase();
}

function updateRotWarn() {
    const el = document.getElementById('rotWarn');
    const turnsUntil = ROTATE_EVERY - (turn % ROTATE_EVERY);
    if (turnsUntil === 1) el.textContent = '⚠️ Board rotates next turn!';
    else if (turnsUntil === ROTATE_EVERY) el.textContent = '';
    else el.textContent = `🔄 Board rotates in ${turnsUntil} turns`;
}

function updateScores() {
    document.getElementById('xWins').textContent = scores.X;
    document.getElementById('oWins').textContent = scores.O;
    document.getElementById('draws').textContent = scores.D;
}

newGame();

const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
let W, H, stars = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
function initStars() { stars = []; for(let i=0;i<Math.floor((W*H)/8000);i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.3,speed:Math.random()*0.14+0.03,opacity:Math.random()*0.45+0.1,ts:Math.random()*0.01+0.003,to:Math.random()*Math.PI*2}); }
let t=0;
function draw() { ctx.clearRect(0,0,W,H); t+=0.016; for(const s of stars){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(148,197,255,${Math.max(0,s.opacity+Math.sin(t*s.ts*60+s.to)*0.14)})`;ctx.fill();s.y-=s.speed;if(s.y<-2){s.y=H+2;s.x=Math.random()*W;}} requestAnimationFrame(draw); }
resize(); initStars(); draw();
window.addEventListener('resize',()=>{resize();initStars();});
</script>
</body>
</html>
