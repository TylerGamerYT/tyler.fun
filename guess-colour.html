<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Colour | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #020617; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; overflow: hidden; user-select: none; }
        #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 40%, #1e3a8a44 0%, transparent 70%); z-index: 0; pointer-events: none; }
        .back-home { position: fixed; top: 20px; left: 24px; font-size: 0.85rem; color: #475569; text-decoration: none; transition: color 0.2s; z-index: 10; }
        .back-home:hover { color: #fff; }
        .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; max-width: 520px; width: 100%; }
        h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem,8vw,3rem); font-weight: 900; margin: 0 0 4px; letter-spacing: -2px; }
        .subtitle { font-size: 0.9rem; color: #64748b; margin-bottom: 24px; }

        .stats-row { display: flex; gap: 24px; margin-bottom: 24px; }
        .stat { display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .stat-val { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 900; color: #f8fafc; }
        .stat-label { font-size: 0.7rem; color: #475569; text-transform: uppercase; letter-spacing: 1.5px; }

        /* colour swatch */
        .swatch {
            width: 200px; height: 200px; border-radius: 24px;
            margin-bottom: 20px; border: 2px solid rgba(255,255,255,0.1);
            transition: background 0.3s;
            box-shadow: 0 0 60px rgba(0,0,0,0.4);
        }

        /* hex display */
        .hex-display {
            font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 900;
            letter-spacing: 4px; color: #f8fafc; margin-bottom: 24px;
        }

        /* 3 options */
        .options-grid { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-bottom: 20px; }
        .option-btn {
            display: flex; align-items: center; gap: 14px;
            background: rgba(15,23,42,0.7); border: 1px solid rgba(51,65,85,0.6);
            border-radius: 14px; padding: 14px 18px; cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
            width: 100%; text-align: left;
        }
        .option-btn:hover:not(:disabled) { background: rgba(30,58,138,0.4); border-color: rgba(96,165,250,0.35); transform: translateX(4px); }
        .option-btn:disabled { cursor: default; }
        .option-btn.correct { background: rgba(16,185,129,0.2); border-color: #10b981; }
        .option-btn.wrong   { background: rgba(239,68,68,0.15); border-color: #ef4444; }
        .opt-swatch { width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1); }
        .opt-hex { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: #f8fafc; letter-spacing: 2px; }
        .opt-name { font-size: 0.75rem; color: #64748b; margin-top: 2px; }

        .feedback { font-size: 1rem; min-height: 24px; margin-bottom: 10px; transition: color 0.3s; }
        .feedback.good { color: #10b981; }
        .feedback.bad  { color: #f87171; }

        .next-btn { padding: 11px 30px; background: rgba(37,99,235,0.25); border: 1.5px solid rgba(96,165,250,0.4); border-radius: 999px; color: #fff; font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; display: none; }
        .next-btn:hover { background: rgba(37,99,235,0.45); }
        .next-btn.show { display: inline-block; }

        /* mode toggle */
        .mode-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { padding: 6px 16px; border-radius: 99px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; border: 1px solid rgba(51,65,85,0.6); background: transparent; color: #475569; cursor: pointer; transition: all 0.2s; }
        .mode-btn.active { background: rgba(96,165,250,0.15); border-color: rgba(96,165,250,0.4); color: #60a5fa; }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="bg-glow"></div>
<a href="/" class="back-home">← Back to tyler.fun</a>

<div class="container">
    <h1>Guess the Colour</h1>
    <p class="subtitle">Which hex code matches the colour?</p>

    <div class="stats-row">
        <div class="stat"><div class="stat-val" id="scoreVal">0</div><div class="stat-label">score</div></div>
        <div class="stat"><div class="stat-val" id="streakVal">0</div><div class="stat-label">streak 🔥</div></div>
        <div class="stat"><div class="stat-val" id="bestVal">0</div><div class="stat-label">best</div></div>
    </div>

    <div class="mode-row">
        <button class="mode-btn active" id="modeEasy" onclick="setMode('easy')">Easy</button>
        <button class="mode-btn" id="modeHard" onclick="setMode('hard')">Hard</button>
    </div>

    <div class="swatch" id="swatch"></div>
    <div class="hex-display" id="hexDisplay"></div>

    <div class="options-grid" id="optionsGrid"></div>

    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextRound()">Next colour →</button>
</div>

<script>
// Named colours for easy mode
const NAMED_COLORS = [
    {hex:'#ef4444',name:'Red'},{hex:'#f97316',name:'Orange'},{hex:'#fbbf24',name:'Amber'},
    {hex:'#10b981',name:'Emerald'},{hex:'#3b82f6',name:'Blue'},{hex:'#8b5cf6',name:'Violet'},
    {hex:'#ec4899',name:'Pink'},{hex:'#14b8a6',name:'Teal'},{hex:'#f43f5e',name:'Rose'},
    {hex:'#84cc16',name:'Lime'},{hex:'#06b6d4',name:'Cyan'},{hex:'#a855f7',name:'Purple'},
    {hex:'#eab308',name:'Yellow'},{hex:'#22c55e',name:'Green'},{hex:'#6366f1',name:'Indigo'},
    {hex:'#f59e0b',name:'Gold'},{hex:'#64748b',name:'Slate'},{hex:'#dc2626',name:'Dark Red'},
];

let score = 0, streak = 0, best = 0, mode = 'easy';
let correctHex = '', answered = false;

function setMode(m) {
    mode = m;
    document.getElementById('modeEasy').className = 'mode-btn' + (m==='easy'?' active':'');
    document.getElementById('modeHard').className = 'mode-btn' + (m==='hard'?' active':'');
    score = 0; streak = 0; updateStats();
    nextRound();
}

function randHex() {
    return '#' + Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');
}

function similarHex(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    const vary = () => Math.max(0,Math.min(255, Math.floor(Math.random()*80)-40));
    const toHex = n => n.toString(16).padStart(2,'0');
    return '#'+toHex((r+vary()))+toHex((g+vary()))+toHex((b+vary()));
}

function nextRound() {
    answered = false;
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('nextBtn').classList.remove('show');

    let correct, options;
    if (mode === 'easy') {
        // pick 3 named colours
        const shuffled = [...NAMED_COLORS].sort(()=>Math.random()-0.5);
        const picks = shuffled.slice(0,3);
        correct = picks[Math.floor(Math.random()*3)];
        correctHex = correct.hex;
        options = picks;
    } else {
        // hard: random hex, 3 similar options
        correctHex = randHex();
        const wrong1 = similarHex(correctHex), wrong2 = similarHex(correctHex);
        options = [{ hex: correctHex }, { hex: wrong1 }, { hex: wrong2 }].sort(()=>Math.random()-0.5);
    }

    // show swatch
    document.getElementById('swatch').style.background = correctHex;
    document.getElementById('hexDisplay').textContent = mode === 'hard' ? '???' : correctHex.toUpperCase();

    // render options
    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<div class="opt-swatch" style="background:${opt.hex}"></div><div><div class="opt-hex">${opt.hex.toUpperCase()}</div>${opt.name?`<div class="opt-name">${opt.name}</div>`:''}</div>`;
        btn.onclick = () => answer(opt.hex, btn);
        grid.appendChild(btn);
    });
}

function answer(hex, btn) {
    if (answered) return;
    answered = true;
    const correct = hex === correctHex;

    // reveal correct
    document.querySelectorAll('.option-btn').forEach(b => {
        b.disabled = true;
        const bHex = b.querySelector('.opt-hex').textContent.toLowerCase();
        if (bHex === correctHex) b.classList.add('correct');
    });

    if (correct) {
        btn.classList.add('correct');
        score += mode === 'hard' ? 20 : 10;
        streak++;
        if (streak > best) best = streak;
        document.getElementById('feedback').textContent = streak > 3 ? `✓ Correct! ${streak} in a row 🔥` : '✓ Correct!';
        document.getElementById('feedback').className = 'feedback good';
        // show actual hex in hard mode
        document.getElementById('hexDisplay').textContent = correctHex.toUpperCase();
    } else {
        btn.classList.add('wrong');
        streak = 0;
        document.getElementById('feedback').textContent = `✗ That was ${correctHex.toUpperCase()}`;
        document.getElementById('feedback').className = 'feedback bad';
        document.getElementById('hexDisplay').textContent = correctHex.toUpperCase();
    }

    updateStats();
    setTimeout(() => document.getElementById('nextBtn').classList.add('show'), 300);
}

function updateStats() {
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('streakVal').textContent = streak;
    document.getElementById('bestVal').textContent = best;
}

nextRound();

const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
let W, H, stars = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
function initStars() { stars = []; for(let i=0;i<Math.floor((W*H)/8000);i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.3,speed:Math.random()*0.14+0.03,opacity:Math.random()*0.45+0.1,ts:Math.random()*0.01+0.003,to:Math.random()*Math.PI*2}); }
let t=0;
function draw() { ctx.clearRect(0,0,W,H); t+=0.016; for(const s of stars){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(148,197,255,${Math.max(0,s.opacity+Math.sin(t*s.ts*60+s.to)*0.14)})`;ctx.fill();s.y-=s.speed;if(s.y<-2){s.y=H+2;s.x=Math.random()*W;}} requestAnimationFrame(draw); }
resize(); initStars(); draw();
window.addEventListener('resize',()=>{resize();initStars();});
</script>
</body>
</html>
