<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursed Breakout | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #020617; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; overflow: hidden; user-select: none; }
        .back-home { position: fixed; top: 20px; left: 24px; font-size: 0.85rem; color: #475569; text-decoration: none; transition: color 0.2s; z-index: 10; }
        .back-home:hover { color: #fff; }

        .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 16px 24px; width: 100%; }

        h1 { font-family: 'Syne', sans-serif; font-size: clamp(1.5rem,5vw,2.2rem); font-weight: 900; margin: 0 0 2px; letter-spacing: -1px; }
        .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 12px; }

        .hud { display: flex; gap: 28px; margin-bottom: 10px; }
        .hud-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .hud-val { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 900; color: #f8fafc; }
        .hud-label { font-size: 0.65rem; color: #475569; text-transform: uppercase; letter-spacing: 1.5px; }

        canvas#game { display: block; border-radius: 14px; border: 1px solid rgba(51,65,85,0.7); background: rgba(5,10,30,0.9); max-width: 100%; }

        .message {
            position: fixed; inset: 0; background: rgba(2,6,23,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 50; backdrop-filter: blur(8px);
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .message.show { opacity: 1; pointer-events: all; }
        .msg-emoji { font-size: 3.5rem; margin-bottom: 10px; }
        .msg-title { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem,6vw,2.6rem); font-weight: 900; margin: 0 0 8px; }
        .msg-sub { color: #64748b; font-size: 0.95rem; margin-bottom: 24px; }
        .msg-sub span { color: #60a5fa; font-weight: 700; }
        .msg-btn { padding: 12px 32px; background: rgba(37,99,235,0.3); border: 1.5px solid rgba(96,165,250,0.45); border-radius: 999px; color: #fff; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .msg-btn:hover { background: rgba(37,99,235,0.5); }
    </style>
</head>
<body>
<a href="index.html" class="back-home">← Back to tyler.fun</a>

<div class="message" id="message">
    <div class="msg-emoji" id="msgEmoji">🎮</div>
    <div class="msg-title" id="msgTitle">Cursed Breakout</div>
    <div class="msg-sub" id="msgSub">Break the bricks. <span>But they fight back.</span></div>
    <button class="msg-btn" onclick="startGame()">Play</button>
</div>

<div class="container">
    <h1>Cursed Breakout</h1>
    <p class="subtitle">Classic brick breaker. Except the bricks don't want to die.</p>
    <div class="hud">
        <div class="hud-stat"><div class="hud-val" id="scoreHud">0</div><div class="hud-label">score</div></div>
        <div class="hud-stat"><div class="hud-val" id="livesHud">3</div><div class="hud-label">lives</div></div>
        <div class="hud-stat"><div class="hud-val" id="levelHud">1</div><div class="hud-label">level</div></div>
    </div>
    <canvas id="game"></canvas>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// sizing
function resize() {
    const maxW = Math.min(window.innerWidth - 32, 520);
    const maxH = Math.min(window.innerHeight - 200, 480);
    canvas.width  = maxW;
    canvas.height = maxH;
}
resize();
window.addEventListener('resize', () => { resize(); initBricks(); });

// game state
let score = 0, lives = 3, level = 1;
let running = false, animId = null;

// paddle
let paddle = { w: 80, h: 10, x: 0, y: 0, speed: 0, target: 0 };

// ball
let ball = { x: 0, y: 0, vx: 0, vy: 0, r: 7, speed: 3.5 };

// bricks
const ROWS = 5, COLS = 8;
const BRICK_PAD = 5;
let bricks = [];

// curse types
const CURSES = ['dodge', 'split', 'grow', 'shield', 'none', 'none', 'none']; // weighted toward none

function initBricks() {
    bricks = [];
    const bw = (canvas.width - BRICK_PAD * (COLS + 1)) / COLS;
    const bh = 18;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const curse = CURSES[Math.floor(Math.random() * CURSES.length)];
            bricks.push({
                x: BRICK_PAD + c * (bw + BRICK_PAD),
                y: 40 + r * (bh + BRICK_PAD),
                w: bw, h: bh,
                hp: curse === 'shield' ? 2 : 1,
                curse,
                alive: true,
                vx: 0, vy: 0, // for dodge
                color: getCurseColor(curse),
            });
        }
    }
}

function getCurseColor(curse) {
    return { dodge:'#8b5cf6', split:'#f97316', grow:'#ef4444', shield:'#fbbf24', none:'#3b82f6' }[curse] || '#3b82f6';
}

function initBall() {
    ball.x = canvas.width / 2;
    ball.y = canvas.height - 80;
    const angle = (Math.random() * 60 + 60) * Math.PI / 180;
    const sp = ball.speed + level * 0.3;
    ball.vx = sp * Math.cos(angle) * (Math.random() < 0.5 ? 1 : -1);
    ball.vy = -sp * Math.sin(angle);
}

function initPaddle() {
    paddle.w = Math.max(60, 90 - level * 4);
    paddle.x = canvas.width / 2 - paddle.w / 2;
    paddle.y = canvas.height - 20;
    paddle.target = paddle.x;
}

function startGame() {
    score = 0; lives = 3; level = 1;
    document.getElementById('message').classList.remove('show');
    updateHud();
    initBricks();
    initPaddle();
    initBall();
    running = true;
    if (animId) cancelAnimationFrame(animId);
    loop();
}

function nextLevel() {
    level++;
    updateHud();
    initBricks();
    initBall();
}

function loseLife() {
    lives--;
    updateHud();
    if (lives <= 0) { gameOver(); return; }
    initBall();
}

function gameOver() {
    running = false;
    document.getElementById('msgEmoji').textContent = '💀';
    document.getElementById('msgTitle').textContent = 'Game Over';
    document.getElementById('msgSub').innerHTML = `Score: <span>${score}</span> · Level: <span>${level}</span>`;
    document.getElementById('message').classList.add('show');
}

function updateHud() {
    document.getElementById('scoreHud').textContent = score;
    document.getElementById('livesHud').textContent = lives;
    document.getElementById('levelHud').textContent = level;
}

// input
document.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    paddle.target = e.clientX - rect.left - paddle.w / 2;
});
document.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    paddle.target = e.touches[0].clientX - rect.left - paddle.w / 2;
}, { passive: false });

// main loop
function loop() {
    if (!running) return;
    update();
    draw();
    animId = requestAnimationFrame(loop);
}

function update() {
    // paddle movement
    paddle.x += (paddle.target - paddle.x) * 0.2;
    paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));

    // dodge bricks move
    bricks.filter(b => b.alive && b.curse === 'dodge').forEach(b => {
        const dx = ball.x - (b.x + b.w/2);
        const dy = ball.y - (b.y + b.h/2);
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
            b.x -= (dx / dist) * 1.2;
            b.y -= (dy / dist) * 0.6;
            b.x = Math.max(0, Math.min(canvas.width - b.w, b.x));
            b.y = Math.max(30, Math.min(canvas.height / 2, b.y));
        }
    });

    // ball movement
    ball.x += ball.vx;
    ball.y += ball.vy;

    // walls
    if (ball.x - ball.r < 0)              { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
    if (ball.x + ball.r > canvas.width)   { ball.x = canvas.width - ball.r; ball.vx = -Math.abs(ball.vx); }
    if (ball.y - ball.r < 0)              { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }

    // bottom
    if (ball.y + ball.r > canvas.height) { loseLife(); return; }

    // paddle collision
    if (ball.vy > 0 &&
        ball.y + ball.r >= paddle.y &&
        ball.y + ball.r <= paddle.y + paddle.h + Math.abs(ball.vy) &&
        ball.x >= paddle.x - ball.r &&
        ball.x <= paddle.x + paddle.w + ball.r) {
        ball.vy = -Math.abs(ball.vy);
        // angle based on hit position
        const rel = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
        ball.vx = rel * (ball.speed + level * 0.3) * 1.5;
    }

    // brick collisions
    let allDead = true;
    bricks.forEach(b => {
        if (!b.alive) return;
        allDead = false;
        if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
            ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
            b.hp--;
            if (b.hp <= 0) {
                b.alive = false;
                applyCurse(b);
                score += 10 * level;
                updateHud();
            }
            // bounce
            const overlapL = ball.x + ball.r - b.x;
            const overlapR = b.x + b.w - (ball.x - ball.r);
            const overlapT = ball.y + ball.r - b.y;
            const overlapB = b.y + b.h - (ball.y - ball.r);
            const minH = Math.min(overlapL, overlapR);
            const minV = Math.min(overlapT, overlapB);
            if (minH < minV) ball.vx = -ball.vx;
            else             ball.vy = -ball.vy;
        }
    });

    if (allDead) nextLevel();
}

function applyCurse(b) {
    if (b.curse === 'split') {
        // spawn two new bricks nearby if space
        for (let i = 0; i < 2; i++) {
            bricks.push({
                x: b.x + (Math.random()-0.5)*40,
                y: b.y + (Math.random()-0.5)*20,
                w: b.w * 0.7, h: b.h,
                hp: 1, curse: 'none', alive: true,
                color: '#fb923c',
            });
        }
    }
    if (b.curse === 'grow') {
        // ball gets slightly faster
        const spd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
        ball.vx = (ball.vx / spd) * (spd + 0.5);
        ball.vy = (ball.vy / spd) * (spd + 0.5);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // bricks
    bricks.filter(b => b.alive).forEach(b => {
        ctx.fillStyle = b.curse === 'shield' && b.hp === 2 ? '#fbbf24' : b.color;
        ctx.beginPath();
        ctx.roundRect(b.x, b.y, b.w, b.h, 4);
        ctx.fill();

        // curse indicator
        if (b.curse !== 'none') {
            ctx.font = '9px Inter';
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.textAlign = 'center';
            const label = {dodge:'dodge',split:'split',grow:'faster',shield:'shield'}[b.curse];
            ctx.fillText(label, b.x + b.w/2, b.y + b.h - 4);
        }
    });

    // paddle
    ctx.fillStyle = '#60a5fa';
    ctx.beginPath();
    ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 5);
    ctx.fill();

    // ball
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fillStyle = '#f8fafc';
    ctx.fill();

    // ball glow
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r + 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(248,250,252,0.1)';
    ctx.fill();
}

document.getElementById('message').classList.add('show');
</script>
</body>
</html
