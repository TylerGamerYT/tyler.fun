<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Flood | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #020617; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; user-select: none; }
        #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 40%, #1e3a8a44 0%, transparent 70%); z-index: 0; pointer-events: none; }
        .back-home { position: fixed; top: 20px; left: 24px; font-size: 0.85rem; color: #475569; text-decoration: none; z-index: 10; }
        .back-home:hover { color: #fff; }
        .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 16px 24px; }
        h1 { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem,7vw,2.6rem); font-weight: 900; margin: 0 0 4px; letter-spacing: -1px; }
        .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 14px; }

        .hud { display: flex; gap: 20px; margin-bottom: 12px; }
        .hud-stat { text-align: center; }
        .hud-val { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 900; color: #f8fafc; }
        .hud-label { font-size: 0.65rem; color: #475569; text-transform: uppercase; letter-spacing: 1.5px; }

        canvas#floodCanvas { display: block; border-radius: 10px; border: 1px solid rgba(51,65,85,0.5); margin-bottom: 14px; }

        .color-btns { display: flex; gap: 10px; margin-bottom: 16px; }
        .color-btn { width: 48px; height: 48px; border-radius: 12px; border: 3px solid transparent; cursor: pointer; transition: transform 0.1s, border-color 0.1s; }
        .color-btn:hover { transform: scale(1.1); }
        .color-btn.selected { border-color: #fff; transform: scale(1.08); }

        .new-btn { padding: 10px 28px; background: rgba(37,99,235,0.25); border: 1.5px solid rgba(96,165,250,0.4); border-radius: 999px; color: #fff; font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; }
        .new-btn:hover { background: rgba(37,99,235,0.45); }

        .result-msg { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; min-height: 24px; margin-bottom: 10px; }
        .result-msg.win { color: #10b981; }
        .result-msg.lose { color: #f87171; }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="bg-glow"></div>
<a href="index.html" class="back-home">← Back to tyler.fun</a>

<div class="container">
    <h1>Colour Flood</h1>
    <p class="subtitle">Flood fill the board from the top-left. Use as few moves as possible.</p>
    <div class="hud">
        <div class="hud-stat"><div class="hud-val" id="movesVal">0</div><div class="hud-label">moves</div></div>
        <div class="hud-stat"><div class="hud-val" id="maxVal">25</div><div class="hud-label">max</div></div>
        <div class="hud-stat"><div class="hud-val" id="pctVal">0%</div><div class="hud-label">flooded</div></div>
    </div>
    <canvas id="floodCanvas"></canvas>
    <div class="color-btns" id="colorBtns"></div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="new-btn" onclick="newGame()">New game</button>
</div>

<script>
const COLS = 14, ROWS = 14, MAX_MOVES = 25;
const COLORS = ['#ef4444','#3b82f6','#22c55e','#fbbf24','#a855f7','#f97316'];
let grid = [], moves = 0, won = false;
const canvas = document.getElementById('floodCanvas');
const ctx = canvas.getContext('2d');
let cell;

function newGame() {
    const maxW = Math.min(window.innerWidth - 48, 400);
    cell = Math.floor(maxW / COLS);
    canvas.width = cell * COLS; canvas.height = cell * ROWS;
    grid = Array.from({length:ROWS}, () => Array.from({length:COLS}, () => COLORS[Math.floor(Math.random()*COLORS.length)]));
    moves = 0; won = false;
    document.getElementById('resultMsg').textContent = '';
    document.getElementById('resultMsg').className = 'result-msg';
    updateHud(); drawGrid(); buildColorBtns();
}

function drawGrid() {
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
        ctx.fillStyle = grid[r][c];
        ctx.fillRect(c*cell, r*cell, cell, cell);
    }
}

function buildColorBtns() {
    const btns = document.getElementById('colorBtns');
    btns.innerHTML = '';
    COLORS.forEach(col => {
        const btn = document.createElement('div');
        btn.className = 'color-btn' + (col===grid[0][0]?' selected':'');
        btn.style.background = col;
        btn.onclick = () => { if (!won) flood(col); };
        btns.appendChild(btn);
    });
}

function flood(newColor) {
    const current = grid[0][0];
    if (newColor === current) return;
    moves++;
    fill(0, 0, current, newColor);
    drawGrid(); updateHud(); buildColorBtns();
    const flooded = grid.flat().filter(c=>c===grid[0][0]).length;
    if (flooded === COLS*ROWS) {
        won = true;
        document.getElementById('resultMsg').textContent = `🎉 You won in ${moves} moves!`;
        document.getElementById('resultMsg').className = 'result-msg win';
    } else if (moves >= MAX_MOVES) {
        document.getElementById('resultMsg').textContent = `💀 Out of moves! ${Math.round(flooded/(COLS*ROWS)*100)}% flooded.`;
        document.getElementById('resultMsg').className = 'result-msg lose';
    }
}

function fill(r, c, target, replacement) {
    if (r<0||r>=ROWS||c<0||c>=COLS||grid[r][c]!==target) return;
    grid[r][c] = replacement;
    fill(r+1,c,target,replacement); fill(r-1,c,target,replacement);
    fill(r,c+1,target,replacement); fill(r,c-1,target,replacement);
}

function updateHud() {
    document.getElementById('movesVal').textContent = moves;
    document.getElementById('maxVal').textContent = MAX_MOVES;
    const flooded = grid.flat().filter(c=>c===grid[0][0]).length;
    document.getElementById('pctVal').textContent = Math.round(flooded/(COLS*ROWS)*100)+'%';
}

newGame();

const pCanvas = document.getElementById('particles'), pCtx = pCanvas.getContext('2d');
let W, H, stars = [];
function resize() { W=pCanvas.width=window.innerWidth; H=pCanvas.height=window.innerHeight; }
function initStars() { stars=[]; for(let i=0;i<Math.floor((W*H)/8000);i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.3,speed:Math.random()*0.14+0.03,opacity:Math.random()*0.45+0.1,ts:Math.random()*0.01+0.003,to:Math.random()*Math.PI*2}); }
let t=0;
function draw() { pCtx.clearRect(0,0,W,H); t+=0.016; for(const s of stars){pCtx.beginPath();pCtx.arc(s.x,s.y,s.r,0,Math.PI*2);pCtx.fillStyle=`rgba(148,197,255,${Math.max(0,s.opacity+Math.sin(t*s.ts*60+s.to)*0.14)})`;pCtx.fill();s.y-=s.speed;if(s.y<-2){s.y=H+2;s.x=Math.random()*W;}} requestAnimationFrame(draw); }
resize(); initStars(); draw();
window.addEventListener('resize',()=>{resize();initStars();newGame();});
</script>
</body>
</html>
