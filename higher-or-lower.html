<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher or Lower | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #020617; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; overflow: hidden; user-select: none; }
        #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 40%, #1e3a8a44 0%, transparent 70%); z-index: 0; pointer-events: none; }
        .back-home { position: fixed; top: 20px; left: 24px; font-size: 0.85rem; color: #475569; text-decoration: none; transition: color 0.2s; z-index: 10; }
        .back-home:hover { color: #fff; }
        .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; max-width: 560px; width: 100%; }
        h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem,8vw,3rem); font-weight: 900; margin: 0 0 6px; letter-spacing: -2px; }
        .subtitle { font-size: 0.95rem; color: #64748b; margin-bottom: 36px; }

        .score-row { display: flex; gap: 28px; margin-bottom: 36px; }
        .stat { display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .stat-val { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 900; color: #f8fafc; }
        .stat-label { font-size: 0.7rem; color: #475569; text-transform: uppercase; letter-spacing: 1.5px; }

        /* card */
        .card {
            background: rgba(15,23,42,0.7);
            border: 1px solid rgba(51,65,85,0.7);
            border-radius: 20px; padding: 36px 40px;
            width: 100%; margin-bottom: 28px;
            backdrop-filter: blur(14px);
        }
        .card-label { font-size: 0.7rem; color: #475569; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: 600; }
        .big-number {
            font-family: 'Syne', sans-serif;
            font-size: clamp(4rem,16vw,7rem);
            font-weight: 900; line-height: 1; letter-spacing: -4px;
            color: #f8fafc; margin-bottom: 8px;
            transition: color 0.3s;
        }
        .big-number.correct { color: #10b981; animation: popIn 0.3s ease; }
        .big-number.wrong   { color: #f87171; animation: shake 0.3s ease; }
        @keyframes popIn { 0%{transform:scale(0.9)} 60%{transform:scale(1.05)} 100%{transform:scale(1)} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

        .range-hint { font-size: 0.8rem; color: #334155; }

        /* buttons */
        .btn-row { display: flex; gap: 16px; margin-bottom: 24px; width: 100%; }
        .guess-btn {
            flex: 1; padding: 18px;
            background: rgba(30,58,138,0.3);
            border: 1.5px solid rgba(96,165,250,0.3);
            border-radius: 16px; color: #fff;
            font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700;
            cursor: pointer; transition: background 0.2s, border-color 0.2s, transform 0.1s, box-shadow 0.2s;
        }
        .guess-btn:hover { background: rgba(37,99,235,0.45); border-color: #60a5fa; box-shadow: 0 0 20px rgba(96,165,250,0.15); }
        .guess-btn:active { transform: scale(0.97); }
        .guess-btn.higher { }
        .guess-btn.lower  { }

        /* history */
        .history { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; min-height: 32px; margin-bottom: 16px; }
        .hist-chip {
            font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 99px;
            font-family: 'Syne', sans-serif;
        }
        .hist-chip.correct { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
        .hist-chip.wrong   { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

        .feedback { font-size: 1rem; color: #475569; min-height: 24px; font-style: italic; }

        /* game over */
        .gameover { position: fixed; inset: 0; background: rgba(2,6,23,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.4s; backdrop-filter: blur(8px); }
        .gameover.show { opacity: 1; pointer-events: all; }
        .go-emoji { font-size: 4rem; margin-bottom: 12px; }
        .go-title { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem,7vw,2.8rem); font-weight: 900; margin: 0 0 8px; }
        .go-sub { color: #64748b; font-size: 1rem; margin-bottom: 28px; }
        .go-sub span { color: #60a5fa; font-weight: 700; }
        .go-btn { padding: 13px 36px; background: rgba(37,99,235,0.3); border: 1.5px solid rgba(96,165,250,0.45); border-radius: 999px; color: #fff; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .go-btn:hover { background: rgba(37,99,235,0.5); }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="bg-glow"></div>
<a href="/" class="back-home">← Back to tyler.fun</a>

<div class="gameover" id="gameover">
    <div class="go-emoji" id="goEmoji">💀</div>
    <div class="go-title" id="goTitle">Wrong!</div>
    <div class="go-sub" id="goSub">You got <span id="goScore">0</span> in a row</div>
    <button class="go-btn" onclick="startGame()">Try again</button>
</div>

<div class="container">
    <h1>Higher or Lower</h1>
    <p class="subtitle">Will the next number be higher or lower?</p>

    <div class="score-row">
        <div class="stat"><div class="stat-val" id="scoreVal">0</div><div class="stat-label">streak</div></div>
        <div class="stat"><div class="stat-val" id="bestVal">0</div><div class="stat-label">best</div></div>
    </div>

    <div class="card">
        <div class="card-label">Current number</div>
        <div class="big-number" id="bigNumber">—</div>
        <div class="range-hint">Range: 1 – <span id="rangeMax">100</span></div>
    </div>

    <div class="btn-row">
        <button class="guess-btn higher" onclick="guess('higher')">▲ Higher</button>
        <button class="guess-btn lower"  onclick="guess('lower')">▼ Lower</button>
    </div>

    <div class="history" id="history"></div>
    <div class="feedback" id="feedback">Make your first guess!</div>
</div>

<script>
let current, next, streak = 0, best = 0, history = [];
let guessing = false;

const feedbacks = {
    correct: ["Nice!", "Correct!", "Yep!", "Easy.", "Got it.", "Nailed it.", "Obviously.", "Too easy?"],
    wrong:   ["Nope.", "Ouch.", "Wrong!", "Really?", "lol", "Yikes.", "So close.", "Not quite."]
};
function randFrom(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function getRange() {
    // range expands as streak grows — makes it harder
    return Math.min(100 + streak * 20, 1000);
}

function randInt(max) { return Math.floor(Math.random() * max) + 1; }

function startGame() {
    streak = 0; history = []; guessing = false;
    document.getElementById('gameover').classList.remove('show');
    document.getElementById('history').innerHTML = '';
    document.getElementById('feedback').textContent = 'Make your first guess!';
    updateStats();
    current = randInt(getRange());
    next = randInt(getRange());
    while (next === current) next = randInt(getRange());
    document.getElementById('bigNumber').textContent = current;
    document.getElementById('bigNumber').className = 'big-number';
    document.getElementById('rangeMax').textContent = getRange();
}

function guess(dir) {
    if (guessing) return;
    guessing = true;

    const isHigher = next > current;
    const correct = (dir === 'higher' && isHigher) || (dir === 'lower' && !isHigher);

    const el = document.getElementById('bigNumber');
    el.textContent = next;
    el.className = 'big-number ' + (correct ? 'correct' : 'wrong');

    if (correct) {
        streak++;
        if (streak > best) best = streak;
        history.push({ val: next, correct: true });
        document.getElementById('feedback').textContent = randFrom(feedbacks.correct);
        updateStats();
        addHistoryChip(next, true);
        setTimeout(() => {
            current = next;
            const range = getRange();
            next = randInt(range);
            while (next === current) next = randInt(range);
            el.textContent = current;
            el.className = 'big-number';
            document.getElementById('rangeMax').textContent = range;
            guessing = false;
        }, 700);
    } else {
        history.push({ val: next, correct: false });
        addHistoryChip(next, false);
        document.getElementById('feedback').textContent = randFrom(feedbacks.wrong);
        setTimeout(() => showGameOver(), 800);
    }
}

function addHistoryChip(val, correct) {
    const hist = document.getElementById('history');
    const chip = document.createElement('span');
    chip.className = 'hist-chip ' + (correct ? 'correct' : 'wrong');
    chip.textContent = val;
    hist.appendChild(chip);
    // keep last 10
    while (hist.children.length > 10) hist.removeChild(hist.firstChild);
}

function showGameOver() {
    const msgs = streak === 0
        ? ["That was quick.", "Rough start.", "First try!"]
        : streak < 5 ? ["Not bad.", "Keep practicing.", "Almost had it."]
        : streak < 10 ? ["Solid run!", "Getting good!", "Impressive!"]
        : ["Legendary.", "Are you cheating?", "Absolutely cracked."];
    document.getElementById('goEmoji').textContent = streak >= 10 ? '🏆' : streak >= 5 ? '😎' : '💀';
    document.getElementById('goTitle').textContent = randFrom(msgs);
    document.getElementById('goScore').textContent = streak;
    document.getElementById('gameover').classList.add('show');
}

function updateStats() {
    document.getElementById('scoreVal').textContent = streak;
    document.getElementById('bestVal').textContent = best;
}

startGame();

const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
let W, H, stars = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
function initStars() { stars = []; for (let i=0;i<Math.floor((W*H)/8000);i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.3,speed:Math.random()*0.14+0.03,opacity:Math.random()*0.45+0.1,ts:Math.random()*0.01+0.003,to:Math.random()*Math.PI*2}); }
let t=0;
function draw() { ctx.clearRect(0,0,W,H); t+=0.016; for(const s of stars){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(148,197,255,${Math.max(0,s.opacity+Math.sin(t*s.ts*60+s.to)*0.14)})`;ctx.fill();s.y-=s.speed;if(s.y<-2){s.y=H+2;s.x=Math.random()*W;}} requestAnimationFrame(draw); }
resize(); initStars(); draw();
window.addEventListener('resize',()=>{resize();initStars();});
</script>
</body>
</html>
