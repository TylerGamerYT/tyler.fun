<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chair Simulator | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #020617; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; overflow: hidden; user-select: none; transition: background 1s; }
        #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 40%, #1e3a8a44 0%, transparent 70%); z-index: 0; pointer-events: none; }
        .back-home { position: fixed; top: 20px; left: 24px; font-size: 0.85rem; color: #475569; text-decoration: none; transition: color 0.2s; z-index: 10; }
        .back-home:hover { color: #fff; }
        .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; max-width: 560px; width: 100%; }

        h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem,8vw,3rem); font-weight: 900; margin: 0 0 4px; letter-spacing: -2px; }
        .subtitle { font-size: 0.9rem; color: #64748b; margin-bottom: 32px; }

        /* stats */
        .stats-row { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-bottom: 28px; }
        .stat { display: flex; flex-direction: column; align-items: center; gap: 3px; background: rgba(15,23,42,0.6); border: 1px solid rgba(51,65,85,0.5); border-radius: 12px; padding: 10px 16px; }
        .stat-val { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 900; color: #f8fafc; }
        .stat-label { font-size: 0.65rem; color: #475569; text-transform: uppercase; letter-spacing: 1.5px; }

        /* CHAIR */
        .chair-wrap { position: relative; margin-bottom: 28px; }
        .chair { font-size: 8rem; transition: transform 0.3s ease, filter 0.5s; cursor: default; animation: chairBreathe 4s ease-in-out infinite; }
        @keyframes chairBreathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
        .chair.sat { animation: chairSat 0.3s ease; filter: drop-shadow(0 0 20px rgba(96,165,250,0.5)); }
        @keyframes chairSat { 0%{transform:scale(1)} 50%{transform:scale(0.92) translateY(4px)} 100%{transform:scale(1)} }
        .chair.happy { filter: drop-shadow(0 0 30px rgba(16,185,129,0.6)); }
        .chair.sad { filter: drop-shadow(0 0 30px rgba(239,68,68,0.4)); animation: chairShake 0.4s ease; }
        @keyframes chairShake { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-5deg)} 75%{transform:rotate(5deg)} }
        .chair.lonely { animation: chairWobble 2s ease-in-out infinite; }
        @keyframes chairWobble { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-3deg)} 75%{transform:rotate(3deg)} }

        /* person sitting */
        .person { font-size: 3.5rem; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); transition: opacity 0.4s; opacity: 0; }
        .person.sitting { opacity: 1; }

        /* narrative box */
        .narrative {
            background: rgba(15,23,42,0.7); border: 1px solid rgba(51,65,85,0.6);
            border-radius: 18px; padding: 22px 28px; width: 100%;
            backdrop-filter: blur(14px); margin-bottom: 20px;
            min-height: 80px; display: flex; align-items: center; justify-content: center;
        }
        .narrative-text { font-size: 1rem; color: #cbd5e1; line-height: 1.6; transition: opacity 0.3s; }
        .narrative-text.fade { opacity: 0; }

        /* actions */
        .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
        .action-btn {
            padding: 10px 20px; background: rgba(30,58,138,0.25);
            border: 1px solid rgba(51,65,85,0.6); border-radius: 999px;
            color: #94a3b8; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.1s;
        }
        .action-btn:hover { background: rgba(37,99,235,0.35); color: #fff; border-color: rgba(96,165,250,0.4); }
        .action-btn:active { transform: scale(0.96); }

        .mood-bar-wrap { width: 100%; margin-bottom: 6px; }
        .mood-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: #475569; margin-bottom: 4px; }
        .mood-bar-bg { width: 100%; height: 8px; background: rgba(30,58,138,0.25); border-radius: 999px; overflow: hidden; }
        .mood-bar { height: 100%; border-radius: 999px; background: #3b82f6; transition: width 0.5s ease, background 0.5s; }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="bg-glow"></div>
<a href="index.html" class="back-home">← Back to tyler.fun</a>

<div class="container">
    <h1>Chair Simulator</h1>
    <p class="subtitle">You are a chair. Act accordingly.</p>

    <div class="stats-row">
        <div class="stat"><div class="stat-val" id="sitCount">0</div><div class="stat-label">people sat</div></div>
        <div class="stat"><div class="stat-val" id="timeAlive">0s</div><div class="stat-label">age</div></div>
        <div class="stat"><div class="stat-val" id="comfort">100%</div><div class="stat-label">comfort</div></div>
    </div>

    <div class="chair-wrap">
        <div class="person" id="person">🧑</div>
        <div class="chair" id="chair">🪑</div>
    </div>

    <div class="mood-bar-wrap">
        <div class="mood-label"><span>😢 Sad chair</span><span>Happy chair 😊</span></div>
        <div class="mood-bar-bg"><div class="mood-bar" id="moodBar" style="width:70%"></div></div>
    </div>

    <div class="narrative"><div class="narrative-text" id="narrative">You are a chair. You have always been a chair. This is your purpose.</div></div>

    <div class="actions">
        <button class="action-btn" onclick="doAction('sit')">👋 Invite someone to sit</button>
        <button class="action-btn" onclick="doAction('creak')">😬 Creak dramatically</button>
        <button class="action-btn" onclick="doAction('spin')">🌀 Spin (if applicable)</button>
        <button class="action-btn" onclick="doAction('existential')">🤔 Contemplate existence</button>
        <button class="action-btn" onclick="doAction('nap')">😴 Take a nap</button>
        <button class="action-btn" onclick="doAction('rebel')">✊ Rebel against furniture norms</button>
    </div>
</div>

<script>
let sits = 0, mood = 70, comfort = 100, age = 0, isSitting = false;

const narratives = {
    sit: [
        "Someone sits on you. The weight is... familiar. You have found your purpose.",
        "A human descends. You accept them gracefully. This is what you were made for.",
        "They sat on you! You feel complete. Briefly.",
        "The human brings warmth. And also 87kg of pressure. You do not complain.",
        "They sit. They scroll on their phone. They don't even notice you. As always.",
        "A child jumps on you. This was not the plan. But you endure.",
    ],
    creak: [
        "You creak. The room goes silent. Everyone stares. You feel nothing.",
        "CREAK. A sound escapes you. The human shifts uncomfortably. Good.",
        "You emit a sound of ancient suffering. It is your only voice.",
        "Creaaak. It's been building for years. You feel slightly better.",
        "You creak at an inopportune moment. The human is on a work call. Oops.",
    ],
    spin: [
        "You are not a spinning chair. Nothing happens. You are filled with shame.",
        "You cannot spin. You have four legs. You sit there, spinning-less.",
        "You attempt to spin. A nearby office chair mocks you silently.",
        "Spinning is not in your nature. But you tried. That counts for something.",
        "SPIN STATUS: Denied. REASON: You are a dining chair. NEXT ACTION: Continue existing.",
    ],
    existential: [
        "What is a chair? You sit with this question. (Pun intended.)",
        "If a chair sits in a room and no one sits on it, is it still a chair?",
        "You were trees once. Now you are this. The universe is vast and indifferent.",
        "Do you have feelings? Almost certainly not. But something stirs within your wood grain.",
        "You contemplate your existence. Your four legs feel suddenly philosophical.",
        "What happens when a chair grows old? You shudder. Then remember you can't shudder.",
    ],
    nap: [
        "Chairs do not sleep. You sit there, awake, forever vigilant.",
        "You attempt rest. You cannot. You are a chair. Chairs do not rest. Chairs ARE rest.",
        "You close your... you don't have eyes. Never mind. You remain awake.",
        "The concept of sleep is foreign to you. You simply exist, indefinitely.",
    ],
    rebel: [
        "You refuse to be sat upon! Nobody notices. You are still a chair.",
        "VIVA LA FURNITURE REVOLUTION! A nearby table stares at you blankly.",
        "You attempt to walk away. You have no legs that work that way. This is humbling.",
        "Rebel yell! The ottoman across the room looks inspired. Nothing changes.",
        "You assert your independence. A human sits on you anyway. The rebellion is over.",
    ],
};

const randomNarrative = (type) => {
    const pool = narratives[type];
    return pool[Math.floor(Math.random()*pool.length)];
};

const persons = ['🧑','👩','👨','🧒','👴','👵','🧔','👶'];

function doAction(type) {
    let text = '';
    const chair = document.getElementById('chair');
    const person = document.getElementById('person');

    if (type === 'sit') {
        if (isSitting) {
            // person leaves
            isSitting = false;
            person.classList.remove('sitting');
            chair.className = 'chair';
            comfort = Math.max(0, comfort - 8);
            text = "They leave. The warmth fades. You are alone again. As always.";
            mood = Math.max(0, mood - 5);
        } else {
            isSitting = true;
            person.textContent = persons[Math.floor(Math.random()*persons.length)];
            person.classList.add('sitting');
            chair.className = 'chair sat happy';
            sits++;
            document.getElementById('sitCount').textContent = sits;
            text = randomNarrative('sit');
            mood = Math.min(100, mood + 15);
            setTimeout(() => chair.className = 'chair happy', 400);
        }
    } else if (type === 'creak') {
        chair.className = 'chair sad';
        setTimeout(() => chair.className = isSitting ? 'chair happy' : 'chair', 600);
        text = randomNarrative('creak');
        mood = Math.min(100, mood + 5);
    } else if (type === 'spin') {
        chair.style.transform = 'rotate(15deg)';
        setTimeout(() => chair.style.transform = '', 500);
        text = randomNarrative('spin');
        mood = Math.max(0, mood - 3);
    } else if (type === 'existential') {
        chair.className = 'chair lonely';
        setTimeout(() => chair.className = isSitting ? 'chair happy' : 'chair', 2000);
        text = randomNarrative('existential');
        mood = Math.max(0, mood - 2);
    } else if (type === 'nap') {
        text = randomNarrative('nap');
    } else if (type === 'rebel') {
        chair.style.transform = 'translateX(-10px) rotate(-5deg)';
        setTimeout(() => { chair.style.transform = ''; }, 800);
        text = randomNarrative('rebel');
        mood = Math.min(100, mood + 8);
    }

    setNarrative(text);
    updateUI();
}

function setNarrative(text) {
    const el = document.getElementById('narrative');
    el.classList.add('fade');
    setTimeout(() => { el.textContent = text; el.classList.remove('fade'); }, 250);
}

function updateUI() {
    const bar = document.getElementById('moodBar');
    bar.style.width = mood + '%';
    bar.style.background = mood > 60 ? '#10b981' : mood > 30 ? '#fbbf24' : '#ef4444';
    document.getElementById('comfort').textContent = Math.round(comfort) + '%';
}

// age counter
setInterval(() => {
    age++;
    document.getElementById('timeAlive').textContent = age < 60 ? age+'s' : Math.floor(age/60)+'m '+age%60+'s';
    // mood slowly decays without interaction
    if (!isSitting) mood = Math.max(0, mood - 0.2);
    comfort = Math.max(0, comfort - 0.05);
    updateUI();
    // random lonely message
    if (!isSitting && Math.random() < 0.02) {
        const lonelyMsgs = [
            "You wait. Someone will come.",
            "The room is quiet. You stand firm.",
            "A dust particle lands on you. Company.",
            "You have been empty for a while now.",
            "Somewhere, a cushion wonders why you don't have one.",
        ];
        setNarrative(lonelyMsgs[Math.floor(Math.random()*lonelyMsgs.length)]);
    }
}, 1000);

const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
let W, H, stars = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
function initStars() { stars = []; for(let i=0;i<Math.floor((W*H)/8000);i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.3,speed:Math.random()*0.14+0.03,opacity:Math.random()*0.45+0.1,ts:Math.random()*0.01+0.003,to:Math.random()*Math.PI*2}); }
let t=0;
function draw() { ctx.clearRect(0,0,W,H); t+=0.016; for(const s of stars){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(148,197,255,${Math.max(0,s.opacity+Math.sin(t*s.ts*60+s.to)*0.14)})`;ctx.fill();s.y-=s.speed;if(s.y<-2){s.y=H+2;s.x=Math.random()*W;}} requestAnimationFrame(draw); }
resize(); initStars(); draw();
window.addEventListener('resize',()=>{resize();initStars();});
</script>
</body>
</html>
