<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Floor is Lava | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #020617; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; overflow: hidden; user-select: none; cursor: none; }
        .back-home { position: fixed; top: 20px; left: 24px; font-size: 0.85rem; color: #475569; text-decoration: none; transition: color 0.2s; z-index: 10; cursor: auto; }
        .back-home:hover { color: #fff; }

        /* lava floor */
        .lava {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 80px;
            background: linear-gradient(to top, #dc2626, #f97316);
            z-index: 2;
            transition: height 0.3s ease;
        }
        .lava::before {
            content: '';
            position: absolute; top: -20px; left: 0; right: 0; height: 24px;
            background: radial-gradient(ellipse 60px 20px at 10% 100%, #f97316 40%, transparent 70%),
                        radial-gradient(ellipse 60px 20px at 35% 100%, #ef4444 40%, transparent 70%),
                        radial-gradient(ellipse 60px 20px at 60% 100%, #f97316 40%, transparent 70%),
                        radial-gradient(ellipse 60px 20px at 85% 100%, #ef4444 40%, transparent 70%);
            animation: lavaBubble 1.5s ease-in-out infinite alternate;
        }
        @keyframes lavaBubble { 0%{transform:scaleY(1)} 100%{transform:scaleY(1.3)} }

        /* custom cursor */
        .cursor {
            position: fixed; width: 28px; height: 28px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
            transform: translate(-50%, -50%);
            transition: background 0.2s;
            box-shadow: 0 0 12px rgba(255,255,255,0.4);
        }
        .cursor.danger { background: #fbbf24; box-shadow: 0 0 16px rgba(251,191,36,0.5); }

        /* ui */
        .container { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; max-width: 580px; width: 100%; pointer-events: none; }

        h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem,8vw,3rem); font-weight: 900; margin: 0 0 6px; letter-spacing: -2px; }
        .subtitle { font-size: 0.95rem; color: #64748b; margin-bottom: 36px; }

        .timer-big {
            font-family: 'Syne', sans-serif;
            font-size: clamp(5rem,18vw,8rem);
            font-weight: 900; line-height: 1; letter-spacing: -4px;
            color: #f8fafc; margin-bottom: 6px;
            transition: color 0.3s;
        }
        .timer-big.danger { color: #fbbf24; }
        .timer-unit { font-size: 0.8rem; color: #475569; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 32px; }

        .info-box {
            background: rgba(15,23,42,0.7); border: 1px solid rgba(51,65,85,0.6);
            border-radius: 16px; padding: 18px 24px;
            backdrop-filter: blur(14px); width: 100%;
        }
        .info-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; padding: 6px 0; border-bottom: 1px solid rgba(51,65,85,0.3); }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #64748b; }
        .info-val { font-family: 'Syne', sans-serif; font-weight: 700; color: #60a5fa; }

        .start-hint { font-size: 1rem; color: #64748b; margin-top: 24px; }

        /* lava rising warning */
        .rising-warn {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
            color: #f97316; z-index: 5; opacity: 0;
            transition: opacity 0.3s; pointer-events: none;
            white-space: nowrap;
        }
        .rising-warn.show { opacity: 1; }

        /* game over */
        .gameover { position: fixed; inset: 0; background: rgba(2,6,23,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.4s; backdrop-filter: blur(8px); }
        .gameover.show { opacity: 1; pointer-events: all; cursor: auto; }
        .go-emoji { font-size: 4rem; margin-bottom: 12px; }
        .go-title { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem,7vw,2.8rem); font-weight: 900; margin: 0 0 8px; color: #f97316; }
        .go-sub { color: #64748b; font-size: 1rem; margin-bottom: 28px; }
        .go-sub span { color: #60a5fa; font-weight: 700; }
        .go-btn { padding: 13px 36px; background: rgba(239,68,68,0.25); border: 1.5px solid rgba(239,68,68,0.5); border-radius: 999px; color: #fff; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .go-btn:hover { background: rgba(239,68,68,0.4); }
    </style>
</head>
<body>
<a href="index.html" class="back-home">← Back to tyler.fun</a>

<div class="cursor" id="cursor"></div>
<div class="lava" id="lava"></div>
<div class="rising-warn" id="risingWarn">🌋 The lava is rising!</div>

<div class="gameover" id="gameover">
    <div class="go-emoji">🔥</div>
    <div class="go-title">YOU TOUCHED THE LAVA</div>
    <div class="go-sub">You survived for <span id="goTime">0.0</span> seconds</div>
    <button class="go-btn" onclick="startGame()">Try again</button>
</div>

<div class="container">
    <h1>The Floor is Lava</h1>
    <p class="subtitle">Don't let your cursor touch the lava. It rises over time.</p>

    <div class="timer-big" id="timerBig">0.0</div>
    <div class="timer-unit">seconds survived</div>

    <div class="info-box">
        <div class="info-row"><span class="info-label">Best time</span><span class="info-val" id="bestTime">0.0s</span></div>
        <div class="info-row"><span class="info-label">Lava height</span><span class="info-val" id="lavaHeight">80px</span></div>
    </div>

    <p class="start-hint" id="startHint">Move your cursor to start</p>
</div>

<script>
let started = false, dead = false;
let startTime = null, survivalTime = 0, best = 0;
let lavaHeight = 80;
let timerInterval = null;
let mouseY = -999, mouseX = -999;

const cursor = document.getElementById('cursor');
const lavaEl = document.getElementById('lava');
const timerEl = document.getElementById('timerBig');
const risingWarn = document.getElementById('risingWarn');

document.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY;
    cursor.style.left = mouseX + 'px';
    cursor.style.top  = mouseY + 'px';
    if (!started && !dead) startGame();
    if (!dead) checkLava();
});

// mobile touch
document.addEventListener('touchmove', e => {
    e.preventDefault();
    mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
    cursor.style.left = mouseX + 'px';
    cursor.style.top  = mouseY + 'px';
    if (!started && !dead) startGame();
    if (!dead) checkLava();
}, { passive: false });

function startGame() {
    started = true; dead = false;
    lavaHeight = 80;
    lavaEl.style.height = lavaHeight + 'px';
    startTime = Date.now();
    survivalTime = 0;
    document.getElementById('startHint').style.opacity = '0';
    document.getElementById('gameover').classList.remove('show');
    risingWarn.classList.remove('show');

    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (dead) return;
        survivalTime = (Date.now() - startTime) / 1000;
        timerEl.textContent = survivalTime.toFixed(1);
        timerEl.className = 'timer-big' + (survivalTime > 10 ? ' danger' : '');

        // lava rises every 3 seconds
        lavaHeight = 80 + Math.floor(survivalTime / 3) * 18;
        lavaHeight = Math.min(lavaHeight, window.innerHeight - 100);
        lavaEl.style.height = lavaHeight + 'px';
        document.getElementById('lavaHeight').textContent = Math.round(lavaHeight) + 'px';

        // warning when lava is high
        if (lavaHeight > 200) risingWarn.classList.add('show');

        // danger cursor colour
        const distFromLava = window.innerHeight - lavaHeight - mouseY;
        cursor.className = 'cursor' + (distFromLava < 80 ? ' danger' : '');

        checkLava();
    }, 50);
}

function checkLava() {
    if (dead) return;
    const lavaTop = window.innerHeight - lavaHeight;
    if (mouseY >= lavaTop - 14) { // 14 = cursor radius
        die();
    }
}

function die() {
    dead = true; started = false;
    clearInterval(timerInterval);
    if (survivalTime > best) best = survivalTime;
    document.getElementById('bestTime').textContent = best.toFixed(1) + 's';
    document.getElementById('goTime').textContent = survivalTime.toFixed(1);
    document.getElementById('gameover').classList.add('show');
    risingWarn.classList.remove('show');
    document.getElementById('startHint').style.opacity = '1';
}

// particles — lightweight since we removed canvas
const c = document.createElement('canvas');
c.id = 'particles'; c.style.cssText = 'position:fixed;inset:0;z-index:1;pointer-events:none;';
document.body.prepend(c);
const ctx = c.getContext('2d');
let W, H, stars = [];
function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
function initStars() { stars = []; for(let i=0;i<Math.floor((W*H)/8000);i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.3,speed:Math.random()*0.14+0.03,opacity:Math.random()*0.45+0.1,ts:Math.random()*0.01+0.003,to:Math.random()*Math.PI*2}); }
let tt=0;
function draw() { ctx.clearRect(0,0,W,H); tt+=0.016; for(const s of stars){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(148,197,255,${Math.max(0,s.opacity+Math.sin(tt*s.ts*60+s.to)*0.14)})`;ctx.fill();s.y-=s.speed;if(s.y<-2){s.y=H+2;s.x=Math.random()*W;}} requestAnimationFrame(draw); }
resize(); initStars(); draw();
window.addEventListener('resize',()=>{resize();initStars();});
</script>
</body>
</html>
