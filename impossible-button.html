<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impossible Button | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background: #020617;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            cursor: default;
        }

        #particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 40%, #1e3a8a44 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .back-home {
            position: fixed;
            top: 20px;
            left: 24px;
            font-size: 0.85rem;
            color: #475569;
            text-decoration: none;
            transition: color 0.2s;
            z-index: 10;
        }
        .back-home:hover { color: #fff; }

        .ui {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 900;
            margin: 0 0 6px;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 0;
        }

        .miss-counter {
            margin-top: 20px;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            color: #475569;
        }

        .miss-counter span {
            color: #f8fafc;
            font-weight: 700;
        }

        /* the button — positioned absolutely so JS can move it */
        #impossibleBtn {
            position: fixed;
            padding: 16px 36px;
            background: rgba(37, 99, 235, 0.25);
            border: 1.5px solid rgba(96, 165, 250, 0.45);
            border-radius: 999px;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
            z-index: 5;
            white-space: nowrap;
        }

        #impossibleBtn:hover {
            background: rgba(37, 99, 235, 0.5);
            border-color: #60a5fa;
            box-shadow: 0 0 24px rgba(96, 165, 250, 0.2);
        }

        /* taunts that pop up */
        .taunt {
            position: fixed;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #94a3b8;
            pointer-events: none;
            animation: tauntFloat 1.4s ease forwards;
            z-index: 20;
            white-space: nowrap;
        }

        @keyframes tauntFloat {
            0%   { opacity: 0; transform: translateY(0) scale(0.85); }
            20%  { opacity: 1; transform: translateY(-8px) scale(1); }
            80%  { opacity: 1; }
            100% { opacity: 0; transform: translateY(-30px) scale(0.9); }
        }
    </style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="bg-glow"></div>
<a href="index.html" class="back-home">← Back to tyler.fun</a>

<div class="ui">
    <h1>Impossible Button</h1>
    <p class="subtitle">It doesn't want to be clicked.</p>
    <div class="miss-counter">Attempts: <span id="missCount">0</span></div>
</div>

<button id="impossibleBtn">Click me!</button>

<script>
const btn = document.getElementById('impossibleBtn');
const missCountEl = document.getElementById('missCount');

let misses = 0;
let btnW, btnH;

const taunts = [
    "Nope.", "Too slow!", "Haha.", "Nice try.", "Not today.",
    "Lol.", "Almost!", "Nuh uh.", "Try harder.", "lmaooo",
    "You'll never catch me.", "Bro really tried.", "Imagine clicking me.",
    "Keep dreaming.", "Get rekt.", "Speedrun any%?", "skill issue",
    "I'm literally running away.", "Your cursor is embarrassing.",
    "Maybe next time.", "I felt that. Just kidding I didn't.",
    "You're not even close.", "Sir this is a button.", "Not a chance.",
    "I have all day.", "Do you?", "I'll be here forever.", "Womp womp."
];

function getSize() {
    const rect = btn.getBoundingClientRect();
    btnW = rect.width;
    btnH = rect.height;
}

// place button at a random safe position
function randomPos() {
    const margin = 40;
    const x = margin + Math.random() * (window.innerWidth  - btnW - margin * 2);
    const y = margin + Math.random() * (window.innerHeight - btnH - margin * 2);
    return { x, y };
}

function setPos(x, y) {
    btn.style.left = x + 'px';
    btn.style.top  = y + 'px';
}

// initial placement (centreish)
function init() {
    getSize();
    setPos((window.innerWidth - btnW) / 2, (window.innerHeight - btnH) / 2);
}

// run away on mousemove
let lastEscape = 0;
document.addEventListener('mousemove', (e) => {
    const now = Date.now();
    if (now - lastEscape < 60) return; // throttle
    lastEscape = now;

    getSize();
    const rect = btn.getBoundingClientRect();
    const bx = rect.left + btnW / 2;
    const by = rect.top  + btnH / 2;

    const dx = e.clientX - bx;
    const dy = e.clientY - by;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const threshold = 160 + misses * 2; // gets more sensitive the more you miss

    if (dist < threshold) {
        // flee in the opposite direction
        const angle = Math.atan2(dy, dx);
        const flee  = 180 + misses * 3;
        let nx = rect.left - Math.cos(angle) * flee;
        let ny = rect.top  - Math.sin(angle) * flee;

        // clamp inside window
        nx = Math.max(10, Math.min(window.innerWidth  - btnW - 10, nx));
        ny = Math.max(10, Math.min(window.innerHeight - btnH - 10, ny));

        setPos(nx, ny);
    }
});

// count misses on click anywhere (not on btn)
document.addEventListener('click', (e) => {
    if (e.target === btn) return;
    misses++;
    missCountEl.textContent = misses;

    // show taunt near cursor
    showTaunt(e.clientX, e.clientY);
});

// clicking the button — impossible but just in case
btn.addEventListener('click', () => {
    misses++;
    missCountEl.textContent = misses;
    showTaunt(
        btn.getBoundingClientRect().left + btnW / 2,
        btn.getBoundingClientRect().top,
        "HOW?!"
    );
    // immediately flee
    const pos = randomPos();
    setPos(pos.x, pos.y);
});

function showTaunt(x, y, override) {
    const t = document.createElement('div');
    t.className = 'taunt';
    t.textContent = override || taunts[Math.floor(Math.random() * taunts.length)];
    t.style.left = (x - 40) + 'px';
    t.style.top  = (y - 20) + 'px';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 1400);
}

// particles
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, stars = [];

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; init(); }
function initStars() {
    stars = [];
    const count = Math.floor((W * H) / 8000);
    for (let i = 0; i < count; i++) {
        stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.1+0.3, speed: Math.random()*0.14+0.03, opacity: Math.random()*0.45+0.1, twinkleSpeed: Math.random()*0.01+0.003, twinkleOffset: Math.random()*Math.PI*2 });
    }
}
let t = 0;
function draw() {
    ctx.clearRect(0,0,W,H); t += 0.016;
    for (const s of stars) {
        const alpha = s.opacity + Math.sin(t * s.twinkleSpeed * 60 + s.twinkleOffset) * 0.14;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(148,197,255,${Math.max(0,alpha)})`; ctx.fill();
        s.y -= s.speed;
        if (s.y < -2) { s.y = H+2; s.x = Math.random()*W; }
    }
    requestAnimationFrame(draw);
}

window.addEventListener('resize', () => { resize(); initStars(); });
resize(); initStars(); draw();
</script>
</body>
</html>
