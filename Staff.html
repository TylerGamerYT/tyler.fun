<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff | tyler.fun</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; }
body { background: #020617; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; overflow-x: hidden; }

#particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

.bg-glow { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 40%, #0c2a4a33 0%, transparent 70%); z-index: 0; pointer-events: none; }

.back-home { position: fixed; top: 20px; left: 24px; font-size: 0.85rem; color: #475569; text-decoration: none; z-index: 10; }
.back-home:hover { color: #fff; }

.container { position: relative; z-index: 1; padding: 80px 24px 60px; max-width: 680px; width: 100%; margin: 0 auto; }

/* banner */
.banner {
    width: 100%; height: 140px; border-radius: 20px;
    background: linear-gradient(135deg, #0c2a4a 0%, #1e3a8a 50%, #0f172a 100%);
    margin-bottom: -44px;
    border: 1px solid rgba(96,165,250,0.25);
}

.banner-label {
    position: absolute;
    bottom: 14px;
    right: 20px;
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: rgba(96,165,250,0.4);
}

/* avatar */
.avatar-wrap { padding: 0 24px; position: relative; z-index: 2; }
.avatar {
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 4px solid #020617;
    background: linear-gradient(135deg, #0c2a4a, #1e3a8a);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.8rem;
}

/* profile */
.profile-info { padding: 12px 24px 24px; }

.name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.display-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 900;
}

/* CHECKMARK FIX */
.vcheck {
    display: inline-flex;
    align-items: center;
    transform: translateY(1px);
    position: relative;
}

.vcheck svg {
    width: 18px;
    height: 18px;
}

.vcheck .tip {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: rgba(15,23,42,0.97);
    border: 1px solid rgba(51,65,85,0.8);
    border-radius: 10px;
    padding: 10px 14px;
    white-space: nowrap;
}

.vcheck:hover .tip { display: block; }

.badge {
    font-size: 0.65rem;
    padding: 3px 9px;
    border-radius: 99px;
}

.badge-staff {
    background: rgba(59,130,246,0.15);
    color: #93c5fd;
}

/* content */
.handle { font-size: 0.9rem; color: #475569; margin-bottom: 12px; }

.bio { font-size: 0.9rem; color: #94a3b8; margin-bottom: 20px; }

.stats-row {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    border-bottom: 1px solid rgba(51,65,85,0.4);
}

.section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 2px;
    color: #475569;
}

.responsibility-list { display: flex; flex-direction: column; gap: 8px; }

.resp-item {
    display: flex;
    gap: 12px;
    background: rgba(15,23,42,0.65);
    padding: 12px;
    border-radius: 12px;
}

.coming-soon {
    margin-top: 20px;
    text-align: center;
    color: #334155;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<div class="bg-glow"></div>

<div class="container">

<div class="banner"></div>

<div class="avatar-wrap">
    <div class="avatar">👥</div>
</div>

<div class="profile-info">

<div class="name-row">
    <span class="display-name">Staff</span>

    <!-- FIXED CHECK -->
    <span class="vcheck">
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="12" fill="#1d9bf0"/>
            <path d="M9.6 16.2l-3.2-3.2 1.4-1.4 1.8 1.8 6.6-6.6 1.4 1.4z" fill="#fff"/>
        </svg>
        <span class="tip">
            <b>Verified account</b>
            <small>This account is verified.</small>
        </span>
    </span>

    <span class="badge badge-staff">Staff</span>
</div>

<div class="handle">@staff</div>
<p class="bio">tyler.fun staff • Helping with general questions.</p>

</div>
</div>

<script>
const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
let W, H, stars = [];

function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }

function initStars(){
    stars=[];
    for(let i=0;i<100;i++){
        stars.push({x:Math.random()*W,y:Math.random()*H});
    }
}

function draw(){
    ctx.clearRect(0,0,W,H);
    for(const s of stars){
        ctx.fillRect(s.x,s.y,1,1);
    }
    requestAnimationFrame(draw);
}

resize(); initStars(); draw();
</script>
</body>
</html>
