<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Time | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            background: #020617;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; margin: 0;
            text-align: center; overflow: hidden;
            user-select: none;
            transition: background 0.15s;
        }
        #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .back-home { position: fixed; top: 20px; left: 24px; font-size: 0.85rem; color: #475569; text-decoration: none; transition: color 0.2s; z-index: 10; }
        .back-home:hover { color: #fff; }

        .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; max-width: 600px; width: 100%; }

        h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem,8vw,3rem); font-weight: 900; margin: 0 0 6px; letter-spacing: -2px; }
        .subtitle { font-size: 0.95rem; color: #64748b; margin-bottom: 48px; }

        .big-time {
            font-family: 'Syne', sans-serif;
            font-size: clamp(5rem,20vw,9rem);
            font-weight: 900; line-height: 1;
            letter-spacing: -4px; margin-bottom: 8px;
            color: #f8fafc;
            min-height: 1.1em;
        }
        .time-unit { font-size: 1rem; color: #475569; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }

        /* click zone */
        .click-zone {
            width: 220px; height: 220px; border-radius: 50%;
            background: rgba(30,58,138,0.25);
            border: 2px solid rgba(96,165,250,0.25);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.1s;
            margin-bottom: 36px;
        }
        .click-zone:hover { background: rgba(37,99,235,0.35); border-color: rgba(96,165,250,0.5); }
        .click-zone:active { transform: scale(0.96); }
        .click-zone.waiting { background: rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.4); }
        .click-zone.go { background: rgba(16,185,129,0.35); border-color: #10b981; box-shadow: 0 0 50px rgba(16,185,129,0.3); animation: pulse 0.4s ease; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }

        .zone-label { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: #64748b; pointer-events: none; transition: color 0.15s; }
        .click-zone.go .zone-label { color: #fff; }
        .click-zone.waiting .zone-label { color: #f87171; }

        .status { font-size: 0.95rem; color: #475569; min-height: 22px; margin-bottom: 28px; }
        .status.good { color: #10b981; }
        .status.bad  { color: #f87171; }

        /* results table */
        .results {
            width: 100%;
            background: rgba(15,23,42,0.65);
            border: 1px solid rgba(51,65,85,0.7);
            border-radius: 18px; padding: 20px 24px;
            backdrop-filter: blur(14px);
        }
        .results-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #475569; margin-bottom: 14px; }
        .result-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(51,65,85,0.35); font-size: 0.9rem; }
        .result-row:last-child { border-bottom: none; }
        .result-label { color: #64748b; }
        .result-val { font-family: 'Syne', sans-serif; font-weight: 700; color: #60a5fa; }
        .result-val.gold { color: #fbbf24; }
        .result-empty { color: #334155; font-size: 0.85rem; }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<a href="/" class="back-home">← Back to tyler.fun</a>

<div class="container">
    <h1>Reaction Time</h1>
    <p class="subtitle">Click when the circle turns green. Simple.</p>

    <div class="big-time" id="bigTime">—</div>
    <div class="time-unit">milliseconds</div>

    <div class="click-zone" id="clickZone" onclick="handleClick()">
        <span class="zone-label" id="zoneLabel">Click to start</span>
    </div>

    <div class="status" id="status">5 rounds per session</div>

    <div class="results">
        <div class="results-title">Your times</div>
        <div id="resultRows"><div class="result-empty">No results yet</div></div>
    </div>
</div>

<script>
const ROUNDS = 5;
let state = 'idle'; // idle | waiting | ready | done
let flashTimeout = null, startTime = null;
let times = [], round = 0;

function handleClick() {
    if (state === 'idle' || state === 'done') { startRound(); return; }
    if (state === 'waiting') {
        // clicked too early
        clearTimeout(flashTimeout);
        setStatus('Too early! Wait for green.', 'bad');
        setState('idle');
        document.getElementById('bigTime').textContent = '—';
        setTimeout(startRound, 1200);
        return;
    }
    if (state === 'ready') {
        const ms = Date.now() - startTime;
        times.push(ms);
        round++;
        document.getElementById('bigTime').textContent = ms;
        setStatus(getRating(ms), 'good');
        setState('idle');
        renderResults();
        if (round >= ROUNDS) { finishGame(); return; }
        setTimeout(startRound, 1000);
    }
}

function startRound() {
    setState('waiting');
    document.getElementById('bigTime').textContent = '—';
    setStatus('Wait for green...', '');
    const delay = 1500 + Math.random() * 3000;
    flashTimeout = setTimeout(() => {
        setState('ready');
        startTime = Date.now();
        setStatus('CLICK NOW!', 'good');
    }, delay);
}

function setState(s) {
    state = s;
    const zone = document.getElementById('clickZone');
    const label = document.getElementById('zoneLabel');
    zone.className = 'click-zone' + (s === 'waiting' ? ' waiting' : s === 'ready' ? ' go' : '');
    if (s === 'idle')    label.textContent = round === 0 ? 'Click to start' : 'Click to continue';
    if (s === 'waiting') label.textContent = 'Wait...';
    if (s === 'ready')   label.textContent = 'CLICK!';
    if (s === 'done')    label.textContent = 'Play again';
}

function finishGame() {
    setState('done');
    const avg = Math.round(times.reduce((a,b)=>a+b,0)/times.length);
    setStatus(`Average: ${avg}ms — ${getRating(avg)}`, 'good');
    renderResults();
}

function getRating(ms) {
    if (ms < 150) return '⚡ Superhuman!';
    if (ms < 200) return '🔥 Incredible!';
    if (ms < 250) return '👏 Great reflexes!';
    if (ms < 300) return '😎 Above average';
    if (ms < 400) return '🙂 Not bad';
    if (ms < 500) return '😐 A little slow';
    return '🐢 Were you asleep?';
}

function renderResults() {
    const el = document.getElementById('resultRows');
    if (!times.length) { el.innerHTML = '<div class="result-empty">No results yet</div>'; return; }
    const best = Math.min(...times);
    const avg  = Math.round(times.reduce((a,b)=>a+b,0)/times.length);
    let html = times.map((t,i) => `
        <div class="result-row">
            <span class="result-label">Round ${i+1}</span>
            <span class="result-val ${t===best&&times.length>1?'gold':''}">${t}ms${t===best&&times.length>1?' 🏆':''}</span>
        </div>`).join('');
    if (times.length > 1) html += `<div class="result-row"><span class="result-label">Average</span><span class="result-val">${avg}ms</span></div>`;
    el.innerHTML = html;
}

function setStatus(msg, cls) {
    const el = document.getElementById('status');
    el.textContent = msg; el.className = 'status' + (cls ? ' '+cls : '');
}

// particles
const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
let W, H, stars = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
function initStars() {
    stars = [];
    for (let i = 0; i < Math.floor((W*H)/8000); i++)
        stars.push({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.1+0.3, speed:Math.random()*0.14+0.03, opacity:Math.random()*0.45+0.1, ts:Math.random()*0.01+0.003, to:Math.random()*Math.PI*2 });
}
let t=0;
function draw() {
    ctx.clearRect(0,0,W,H); t+=0.016;
    for (const s of stars) {
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(148,197,255,${Math.max(0,s.opacity+Math.sin(t*s.ts*60+s.to)*0.14)})`; ctx.fill();
        s.y-=s.speed; if(s.y<-2){s.y=H+2;s.x=Math.random()*W;}
    }
    requestAnimationFrame(draw);
}
resize(); initStars(); draw();
window.addEventListener('resize', ()=>{ resize(); initStars(); });
</script>
</body>
</html>
