<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            background: #020617;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-y: auto;
            padding: 40px 0;
        }
        #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 40%, #1e3a8a44 0%, transparent 70%); z-index: 0; pointer-events: none; }

        .back-home { position: fixed; top: 20px; left: 24px; font-size: 0.85rem; color: #475569; text-decoration: none; transition: color 0.2s; z-index: 10; }
        .back-home:hover { color: #fff; }

        .card {
            position: relative; z-index: 1;
            background: rgba(15,23,42,0.8);
            border: 1px solid rgba(51,65,85,0.7);
            border-radius: 24px;
            padding: 40px 36px;
            width: 100%; max-width: 420px;
            margin: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: fadeUp 0.5s ease forwards;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        .logo { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 28px; text-align: center; }
        .logo span { color: #60a5fa; }

        h1 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 900; margin: 0 0 6px; letter-spacing: -1px; }
        .sub { font-size: 0.85rem; color: #64748b; margin-bottom: 28px; }
        .sub a { color: #60a5fa; text-decoration: none; font-weight: 600; }
        .sub a:hover { text-decoration: underline; }

        .github-btn {
            width: 100%; padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600;
            cursor: not-allowed; display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-bottom: 20px; opacity: 0.5;
            position: relative;
        }
        .github-btn svg { width: 18px; height: 18px; fill: #fff; flex-shrink: 0; }
        .coming-soon-tag { position: absolute; right: 12px; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #475569; background: rgba(51,65,85,0.5); padding: 2px 7px; border-radius: 99px; }

        .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(51,65,85,0.6); }
        .divider span { font-size: 0.75rem; color: #334155; }

        .field { margin-bottom: 16px; }
        label { font-size: 0.78rem; font-weight: 600; color: #94a3b8; display: block; margin-bottom: 6px; }
        input {
            width: 100%; padding: 11px 14px;
            background: rgba(30,41,59,0.6);
            border: 1px solid rgba(51,65,85,0.7);
            border-radius: 10px; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 0.9rem;
            outline: none; transition: border-color 0.2s, background 0.2s;
        }
        input:focus { border-color: rgba(96,165,250,0.5); background: rgba(30,41,59,0.9); }
        input::placeholder { color: #334155; }

        .field-hint { font-size: 0.72rem; color: #334155; margin-top: 5px; }

        .submit-btn {
            width: 100%; padding: 13px;
            background: #2563eb;
            border: none; border-radius: 12px; color: #fff;
            font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
            cursor: not-allowed; margin-top: 8px; opacity: 0.6;
        }

        .terms { font-size: 0.72rem; color: #334155; text-align: center; margin-top: 14px; line-height: 1.5; }
        .terms a { color: #475569; text-decoration: none; }
        .terms a:hover { color: #60a5fa; }

        .notice {
            margin-top: 20px; padding: 12px 14px;
            background: rgba(96,165,250,0.07);
            border: 1px solid rgba(96,165,250,0.15);
            border-radius: 10px; font-size: 0.78rem;
            color: #475569; text-align: center; line-height: 1.5;
        }
        .notice span { color: #60a5fa; font-weight: 600; }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="bg-glow"></div>
<a href="/" class="back-home">← Back to tyler.fun</a>

<div class="card">
    <div class="logo">tyler<span>.fun</span></div>
    <h1>Create an account</h1>
    <p class="sub">Already have one? <a href="/login.html">Log in</a></p>

    <button class="github-btn" disabled>
        <svg viewBox="0 0 24 24"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
        Sign up with GitHub
        <span class="coming-soon-tag">Soon</span>
    </button>

    <div class="divider"><span>or sign up with email</span></div>

    <div class="field">
        <label>Username</label>
        <input type="text" placeholder="coolperson123" disabled />
        <div class="field-hint">This will be your @handle on tyler.fun</div>
    </div>
    <div class="field">
        <label>Email</label>
        <input type="email" placeholder="you@example.com" disabled />
    </div>
    <div class="field">
        <label>Password</label>
        <input type="password" placeholder="••••••••" disabled />
        <div class="field-hint">At least 8 characters</div>
    </div>

    <button class="submit-btn" disabled>Create account</button>

    <p class="terms">By signing up you agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>

    <div class="notice">
        <span>Account system coming soon.</span> Sit tight we're working on it.
    </div>
</div>

<script>
const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
let W, H, stars = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
function initStars() { stars = []; for(let i=0;i<Math.floor((W*H)/8000);i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.3,speed:Math.random()*0.14+0.03,opacity:Math.random()*0.45+0.1,ts:Math.random()*0.01+0.003,to:Math.random()*Math.PI*2}); }
let t=0;
function draw() { ctx.clearRect(0,0,W,H); t+=0.016; for(const s of stars){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(148,197,255,${Math.max(0,s.opacity+Math.sin(t*s.ts*60+s.to)*0.14)})`;ctx.fill();s.y-=s.speed;if(s.y<-2){s.y=H+2;s.x=Math.random()*W;}} requestAnimationFrame(draw); }
resize(); initStars(); draw();
window.addEventListener('resize',()=>{resize();initStars();});
</script>
</body>
</html>
