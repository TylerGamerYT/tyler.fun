<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Two Truths One Lie | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        background: #020617;
        color: #fff;
        font-family: "Inter", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        text-align: center;
        overflow: hidden;
        user-select: none;
      }
      #particles {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
      .bg-glow {
        position: fixed;
        inset: 0;
        background: radial-gradient(
          ellipse 80% 60% at 50% 40%,
          #1e3a8a44 0%,
          transparent 70%
        );
        z-index: 0;
        pointer-events: none;
      }
      .back-home {
        position: fixed;
        top: 20px;
        left: 24px;
        font-size: 0.85rem;
        color: #475569;
        text-decoration: none;
        z-index: 10;
      }
      .back-home:hover {
        color: #fff;
      }
      .container {
        position: relative;
        z-index: 1;
        padding: 40px 24px;
        max-width: 600px;
        width: 100%;
      }
      h1 {
        font-family: "Syne", sans-serif;
        font-size: clamp(2rem, 8vw, 3rem);
        font-weight: 900;
        margin: 0 0 6px;
        letter-spacing: -2px;
      }
      .subtitle {
        font-size: 0.95rem;
        color: #64748b;
        margin-bottom: 28px;
      }

      .stats-row {
        display: flex;
        gap: 24px;
        justify-content: center;
        margin-bottom: 28px;
      }
      .stat {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
      }
      .stat-val {
        font-family: "Syne", sans-serif;
        font-size: 1.8rem;
        font-weight: 900;
        color: #f8fafc;
      }
      .stat-label {
        font-size: 0.7rem;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 1.5px;
      }

      .round-badge {
        font-size: 0.75rem;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 16px;
      }

      .cards-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 24px;
      }
      .statement-card {
        background: rgba(15, 23, 42, 0.7);
        border: 1.5px solid rgba(51, 65, 85, 0.6);
        border-radius: 16px;
        padding: 20px 24px;
        cursor: pointer;
        text-align: left;
        font-size: 0.95rem;
        color: #cbd5e1;
        line-height: 1.5;
        transition:
          background 0.15s,
          border-color 0.15s,
          transform 0.1s;
        position: relative;
      }
      .statement-card:hover {
        background: rgba(30, 58, 138, 0.35);
        border-color: rgba(96, 165, 250, 0.4);
        transform: translateX(4px);
      }
      .statement-card.correct {
        background: rgba(16, 185, 129, 0.15);
        border-color: #10b981;
        color: #fff;
      }
      .statement-card.wrong {
        background: rgba(239, 68, 68, 0.15);
        border-color: #ef4444;
        color: #fff;
      }
      .statement-card.reveal {
        background: rgba(251, 191, 36, 0.1);
        border-color: #fbbf24;
        color: #fff;
      }
      .statement-card:disabled {
        cursor: default;
        transform: none;
      }
      .card-letter {
        font-family: "Syne", sans-serif;
        font-weight: 900;
        font-size: 0.8rem;
        color: #334155;
        margin-bottom: 6px;
        display: block;
        text-transform: uppercase;
        letter-spacing: 1.5px;
      }
      .card-result {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.2rem;
      }

      .feedback {
        font-size: 1rem;
        min-height: 26px;
        margin-bottom: 20px;
        font-weight: 600;
        transition: color 0.3s;
      }
      .feedback.good {
        color: #10b981;
      }
      .feedback.bad {
        color: #f87171;
      }

      .next-btn {
        padding: 12px 32px;
        background: rgba(37, 99, 235, 0.25);
        border: 1.5px solid rgba(96, 165, 250, 0.4);
        border-radius: 999px;
        color: #fff;
        font-family: "Syne", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        display: none;
      }
      .next-btn:hover {
        background: rgba(37, 99, 235, 0.45);
      }
      .next-btn.show {
        display: inline-block;
      }

      .gameover {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.92);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 50;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s;
        backdrop-filter: blur(8px);
      }
      .gameover.show {
        opacity: 1;
        pointer-events: all;
      }
      .go-emoji {
        font-size: 4rem;
        margin-bottom: 12px;
      }
      .go-title {
        font-family: "Syne", sans-serif;
        font-size: clamp(1.8rem, 7vw, 2.8rem);
        font-weight: 900;
        margin: 0 0 8px;
      }
      .go-sub {
        color: #64748b;
        font-size: 1rem;
        margin-bottom: 28px;
      }
      .go-sub span {
        color: #60a5fa;
        font-weight: 700;
      }
      .go-btn {
        padding: 13px 36px;
        background: rgba(37, 99, 235, 0.3);
        border: 1.5px solid rgba(96, 165, 250, 0.45);
        border-radius: 999px;
        color: #fff;
        font-family: "Syne", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
      }
      .go-btn:hover {
        background: rgba(37, 99, 235, 0.5);
      }
    </style>
  </head>
  <body>
    <canvas id="particles"></canvas>
    <div class="bg-glow"></div>
    <a href="/" class="back-home">← Back to tyler.fun</a>

    <div class="gameover" id="gameover">
      <div class="go-emoji">🧠</div>
      <div class="go-title" id="goTitle">Game over!</div>
      <div class="go-sub">
        You got <span id="goScore">0</span> out of
        <span id="goTotal">0</span> correct
      </div>
      <button class="go-btn" onclick="startGame()">Play again</button>
    </div>

    <div class="container">
      <h1>Two Truths One Lie</h1>
      <p class="subtitle">Pick the statement that is false.</p>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-val" id="scoreVal">0</div>
          <div class="stat-label">correct</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="wrongVal">0</div>
          <div class="stat-label">wrong</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="roundVal">1</div>
          <div class="stat-label">round</div>
        </div>
      </div>
      <div class="round-badge" id="roundBadge">Round 1 of 10</div>
      <div class="cards-grid" id="cardsGrid"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextRound()">
        Next →
      </button>
    </div>

    <script>
      const QUESTIONS = [
        {
          statements: [
            "Honey never expires and edible honey has been found in ancient Egyptian tombs.",
            "A group of flamingos is called a flamboyance.",
            "The Great Wall of China is visible from space with the naked eye.",
          ],
          lie: 2,
        },
        {
          statements: [
            "Octopuses have three hearts.",
            "A day on Venus is longer than a year on Venus.",
            "Sharks are mammals.",
          ],
          lie: 2,
        },
        {
          statements: [
            "Bananas are technically berries.",
            "Strawberries are not actually berries botanically.",
            "Pineapples grow on tall trees.",
          ],
          lie: 2,
        },
        {
          statements: [
            "Cleopatra lived closer in time to the Moon landing than to the construction of the Great Pyramid.",
            "Oxford University is older than the Aztec Empire.",
            "The Eiffel Tower was originally built as a permanent structure.",
          ],
          lie: 2,
        },
        {
          statements: [
            "A group of crows is called a murder.",
            "Dolphins sleep with one eye open.",
            "Cats can taste sweetness just like humans.",
          ],
          lie: 2,
        },
        {
          statements: [
            "There are more possible iterations of a game of chess than there are atoms in the observable universe.",
            "The shortest war in history lasted 38 minutes.",
            "Finland and Sweden share the longest international border in the world.",
          ],
          lie: 2,
        },
        {
          statements: [
            "Humans share about 60% of their DNA with bananas.",
            "A sneeze travels at about 100 miles per hour.",
            "Your fingernails grow faster than your toenails.",
          ],
          lie: 1,
        },
        {
          statements: [
            'The word "nerd" was first coined by Dr. Seuss.',
            "Nintendo was founded in 1889.",
            "The first computer bug was an actual insect found in a computer in 2001.",
          ],
          lie: 2,
        },
        {
          statements: [
            "Wombat poop is cube-shaped.",
            "Penguins propose to their mates with pebbles.",
            "Elephants are the only animals that cannot jump, along with hippos and rhinos.",
          ],
          lie: 2,
        },
        {
          statements: [
            "Hot water can freeze faster than cold water under certain conditions.",
            "The average person walks about 100,000 miles in their lifetime.",
            "Light from the Sun takes about 30 minutes to reach Earth.",
          ],
          lie: 2,
        },
        {
          statements: [
            "Scotland's national animal is the unicorn.",
            "A group of owls is called a parliament.",
            "Goldfish have a memory span of only 3 seconds.",
          ],
          lie: 2,
        },
        {
          statements: [
            "The Eiffel Tower grows taller in summer due to thermal expansion.",
            "There are more trees on Earth than stars in the Milky Way.",
            "Mount Everest is the tallest mountain measured from Earth's core.",
          ],
          lie: 2,
        },
      ];

      let score = 0,
        wrong = 0,
        round = 0,
        answered = false;
      const ROUNDS = 10;
      let usedIdx = [];

      function startGame() {
        score = 0;
        wrong = 0;
        round = 0;
        usedIdx = [];
        document.getElementById("gameover").classList.remove("show");
        updateStats();
        nextRound();
      }

      function nextRound() {
        if (round >= ROUNDS) {
          endGame();
          return;
        }
        round++;
        answered = false;
        document.getElementById("feedback").textContent = "";
        document.getElementById("feedback").className = "feedback";
        document.getElementById("nextBtn").classList.remove("show");
        document.getElementById("roundBadge").textContent =
          `Round ${round} of ${ROUNDS}`;
        updateStats();

        let idx;
        const available = QUESTIONS.map((_, i) => i).filter(
          (i) => !usedIdx.includes(i),
        );
        idx = available.length
          ? available[Math.floor(Math.random() * available.length)]
          : Math.floor(Math.random() * QUESTIONS.length);
        usedIdx.push(idx);
        const q = QUESTIONS[idx];

        // shuffle statements but track which is the lie
        const shuffled = q.statements
          .map((s, i) => ({ s, isLie: i === q.lie }))
          .sort(() => Math.random() - 0.5);

        const grid = document.getElementById("cardsGrid");
        grid.innerHTML = "";
        shuffled.forEach((item, i) => {
          const card = document.createElement("div");
          card.className = "statement-card";
          card.innerHTML = `<span class="card-letter">${String.fromCharCode(65 + i)}</span>${item.s}`;
          card.onclick = () => answer(item.isLie, card, shuffled);
          grid.appendChild(card);
        });
      }

      function answer(isLie, clicked, shuffled) {
        if (answered) return;
        answered = true;
        const cards = document.querySelectorAll(".statement-card");
        cards.forEach((c) => (c.onclick = null));

        if (isLie) {
          score++;
          clicked.classList.add("correct");
          clicked.innerHTML += '<span class="card-result">✓</span>';
          document.getElementById("feedback").textContent = "✓ Correct!";
          document.getElementById("feedback").className = "feedback good";
        } else {
          wrong++;
          clicked.classList.add("wrong");
          clicked.innerHTML += '<span class="card-result">✗</span>';
          // reveal correct
          cards.forEach((c, i) => {
            if (shuffled[i].isLie) {
              c.classList.add("reveal");
              c.innerHTML += '<span class="card-result">💡</span>';
            }
          });
          document.getElementById("feedback").textContent =
            "✗ Wrong! That was actually true.";
          document.getElementById("feedback").className = "feedback bad";
        }

        updateStats();
        setTimeout(
          () => document.getElementById("nextBtn").classList.add("show"),
          400,
        );
      }

      function updateStats() {
        document.getElementById("scoreVal").textContent = score;
        document.getElementById("wrongVal").textContent = wrong;
        document.getElementById("roundVal").textContent = round;
      }

      function endGame() {
        const title =
          score < 4
            ? "Rough."
            : score < 7
              ? "Not bad!"
              : score < 9
                ? "Sharp!"
                : "Big brain.";
        document.getElementById("goTitle").textContent = title;
        document.getElementById("goScore").textContent = score;
        document.getElementById("goTotal").textContent = ROUNDS;
        document.getElementById("gameover").classList.add("show");
      }

      startGame();

      const canvas = document.getElementById("particles"),
        ctx = canvas.getContext("2d");
      let W,
        H,
        stars = [];
      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      function initStars() {
        stars = [];
        for (let i = 0; i < Math.floor((W * H) / 8000); i++)
          stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.1 + 0.3,
            speed: Math.random() * 0.14 + 0.03,
            opacity: Math.random() * 0.45 + 0.1,
            ts: Math.random() * 0.01 + 0.003,
            to: Math.random() * Math.PI * 2,
          });
      }
      let t = 0;
      function draw() {
        ctx.clearRect(0, 0, W, H);
        t += 0.016;
        for (const s of stars) {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(148,197,255,${Math.max(0, s.opacity + Math.sin(t * s.ts * 60 + s.to) * 0.14)})`;
          ctx.fill();
          s.y -= s.speed;
          if (s.y < -2) {
            s.y = H + 2;
            s.x = Math.random() * W;
          }
        }
        requestAnimationFrame(draw);
      }
      resize();
      initStars();
      draw();
      window.addEventListener("resize", () => {
        resize();
        initStars();
      });
    </script>
  </body>
</html>
