<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scared Asteroids | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        background: #020617;
        color: #fff;
        font-family: "Inter", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
        user-select: none;
      }
      .back-home {
        position: fixed;
        top: 20px;
        left: 24px;
        font-size: 0.85rem;
        color: #475569;
        text-decoration: none;
        z-index: 10;
      }
      .back-home:hover {
        color: #fff;
      }
      .hud {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        display: flex;
        gap: 20px;
      }
      .hud-stat {
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(51, 65, 85, 0.6);
        border-radius: 12px;
        padding: 7px 16px;
        text-align: center;
        backdrop-filter: blur(10px);
      }
      .hud-val {
        font-family: "Syne", sans-serif;
        font-size: 1.2rem;
        font-weight: 900;
        color: #f8fafc;
      }
      .hud-label {
        font-size: 0.62rem;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 1.5px;
      }
      canvas#game {
        display: block;
      }
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.92);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 50;
        backdrop-filter: blur(8px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      .overlay.show {
        opacity: 1;
        pointer-events: all;
      }
      .ov-emoji {
        font-size: 3.5rem;
        margin-bottom: 10px;
      }
      .ov-title {
        font-family: "Syne", sans-serif;
        font-size: clamp(1.8rem, 7vw, 2.8rem);
        font-weight: 900;
        margin: 0 0 8px;
      }
      .ov-sub {
        color: #64748b;
        font-size: 0.95rem;
        margin-bottom: 24px;
        text-align: center;
        max-width: 340px;
      }
      .ov-btn {
        padding: 12px 32px;
        background: rgba(37, 99, 235, 0.3);
        border: 1.5px solid rgba(96, 165, 250, 0.45);
        border-radius: 999px;
        color: #fff;
        font-family: "Syne", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
      }
      .ov-btn:hover {
        background: rgba(37, 99, 235, 0.5);
      }
      .controls-hint {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.75rem;
        color: #334155;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <a href="/" class="back-home">← Back to tyler.fun</a>
    <div class="hud">
      <div class="hud-stat">
        <div class="hud-val" id="scoreHud">0</div>
        <div class="hud-label">score</div>
      </div>
      <div class="hud-stat">
        <div class="hud-val" id="livesHud">3</div>
        <div class="hud-label">lives</div>
      </div>
      <div class="hud-stat">
        <div class="hud-val" id="levelHud">1</div>
        <div class="hud-label">level</div>
      </div>
    </div>

    <div class="overlay show" id="startOverlay">
      <div class="ov-emoji">😰</div>
      <div class="ov-title">Scared Asteroids</div>
      <div class="ov-sub">
        Classic asteroids but your ship is terrified and randomly panics. Good
        luck.
      </div>
      <button class="ov-btn" onclick="startGame()">Play</button>
    </div>
    <div class="overlay" id="deadOverlay">
      <div class="ov-emoji">😭</div>
      <div class="ov-title" id="deadTitle">The ship gave up.</div>
      <div class="ov-sub" id="deadSub">Score: 0</div>
      <button class="ov-btn" onclick="startGame()">Try again</button>
    </div>

    <canvas id="game"></canvas>
    <p class="controls-hint">
      Arrow keys / WASD to move · Space to shoot · Ship panics randomly
    </p>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      let ship, bullets, asteroids, score, lives, level, running, animId;
      let keys = {},
        panicTimer = 0,
        panicMode = false,
        panicDir = 0;

      const PANIC_MESSAGES = [
        "AAAAA",
        "NOPE",
        "TOO MANY",
        "im scared",
        "run!!",
        "WHY",
        "help",
        "not today",
        "ABORT",
      ];
      let panicMsg = "",
        panicMsgTimer = 0;

      function startGame() {
        document.getElementById("startOverlay").classList.remove("show");
        document.getElementById("deadOverlay").classList.remove("show");
        score = 0;
        lives = 3;
        level = 1;
        ship = {
          x: canvas.width / 2,
          y: canvas.height / 2,
          vx: 0,
          vy: 0,
          angle: 0,
          invincible: 0,
        };
        bullets = [];
        asteroids = [];
        spawnAsteroids(4 + level);
        running = true;
        if (animId) cancelAnimationFrame(animId);
        loop();
      }

      function spawnAsteroids(n) {
        for (let i = 0; i < n; i++) {
          let x, y;
          do {
            x = Math.random() * canvas.width;
            y = Math.random() * canvas.height;
          } while (dist(x, y, ship.x, ship.y) < 150);
          const size = 30 + Math.random() * 30;
          const speed = 1 + Math.random() * 1.5 + level * 0.3;
          const angle = Math.random() * Math.PI * 2;
          asteroids.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size,
            hp: size > 45 ? 2 : 1,
          });
        }
      }

      function dist(x1, y1, x2, y2) {
        return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
      }

      let shootCooldown = 0;
      function loop() {
        if (!running) return;
        update();
        draw();
        animId = requestAnimationFrame(loop);
      }

      function update() {
        // panic system
        panicTimer--;
        if (panicTimer <= 0) {
          panicMode = !panicMode;
          panicTimer = panicMode
            ? 60 + Math.random() * 90
            : 120 + Math.random() * 180;
          if (panicMode) {
            panicDir = (Math.random() - 0.5) * 0.2;
            panicMsg =
              PANIC_MESSAGES[Math.floor(Math.random() * PANIC_MESSAGES.length)];
            panicMsgTimer = 60;
          }
        }
        if (panicMsgTimer > 0) panicMsgTimer--;

        // ship movement
        const thrust = 0.18;
        if (panicMode) {
          ship.angle += panicDir;
          ship.vx += Math.sin(ship.angle) * thrust * 1.5;
          ship.vy -= Math.cos(ship.angle) * thrust * 1.5;
        } else {
          if (keys["ArrowLeft"] || keys["a"]) ship.angle -= 0.06;
          if (keys["ArrowRight"] || keys["d"]) ship.angle += 0.06;
          if (keys["ArrowUp"] || keys["w"]) {
            ship.vx += Math.sin(ship.angle) * thrust;
            ship.vy -= Math.cos(ship.angle) * thrust;
          }
          if (keys["ArrowDown"] || keys["s"]) {
            ship.vx -= Math.sin(ship.angle) * thrust * 0.5;
            ship.vy += Math.cos(ship.angle) * thrust * 0.5;
          }
        }

        ship.vx *= 0.97;
        ship.vy *= 0.97;
        ship.x = (ship.x + ship.vx + canvas.width) % canvas.width;
        ship.y = (ship.y + ship.vy + canvas.height) % canvas.height;
        if (ship.invincible > 0) ship.invincible--;

        // shooting — panic mode shoots randomly
        shootCooldown--;
        const wantShoot = keys[" "] || (panicMode && Math.random() < 0.04);
        if (wantShoot && shootCooldown <= 0) {
          const bulletAngle =
            ship.angle + (panicMode ? (Math.random() - 0.5) * 0.8 : 0);
          bullets.push({
            x: ship.x,
            y: ship.y,
            vx: Math.sin(bulletAngle) * 8,
            vy: -Math.cos(bulletAngle) * 8,
            life: 60,
          });
          shootCooldown = panicMode ? 8 : 15;
        }

        // bullets
        bullets = bullets.filter((b) => {
          b.x = (b.x + b.vx + canvas.width) % canvas.width;
          b.y = (b.y + b.vy + canvas.height) % canvas.height;
          return --b.life > 0;
        });

        // asteroids
        asteroids.forEach((a) => {
          a.x = (a.x + a.vx + canvas.width) % canvas.width;
          a.y = (a.y + a.vy + canvas.height) % canvas.height;
        });

        // bullet vs asteroid
        bullets = bullets.filter((b) => {
          for (let i = asteroids.length - 1; i >= 0; i--) {
            const a = asteroids[i];
            if (dist(b.x, b.y, a.x, a.y) < a.size) {
              a.hp--;
              if (a.hp <= 0) {
                score += Math.floor((100 / a.size) * 30);
                if (a.size > 35) {
                  for (let j = 0; j < 2; j++) {
                    const angle = Math.random() * Math.PI * 2,
                      spd = 1.5 + Math.random() * 2;
                    asteroids.push({
                      x: a.x,
                      y: a.y,
                      vx: Math.cos(angle) * spd,
                      vy: Math.sin(angle) * spd,
                      size: a.size / 2,
                      hp: 1,
                    });
                  }
                }
                asteroids.splice(i, 1);
              }
              updateHud();
              return false;
            }
          }
          return true;
        });

        // ship vs asteroid
        if (ship.invincible === 0) {
          for (const a of asteroids) {
            if (dist(ship.x, ship.y, a.x, a.y) < a.size + 12) {
              lives--;
              ship.invincible = 120;
              updateHud();
              if (lives <= 0) {
                die();
                return;
              }
              break;
            }
          }
        }

        if (asteroids.length === 0) {
          level++;
          spawnAsteroids(4 + level);
          updateHud();
        }
      }

      function draw() {
        ctx.fillStyle = "#020617";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // asteroids
        asteroids.forEach((a) => {
          ctx.strokeStyle = "#60a5fa";
          ctx.lineWidth = 2;
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const r = a.size * (0.8 + Math.sin(i * 2.3) * 0.2);
            const x = a.x + Math.cos(angle) * r,
              y = a.y + Math.sin(angle) * r;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.stroke();
        });

        // bullets
        bullets.forEach((b) => {
          ctx.fillStyle = "#fbbf24";
          ctx.beginPath();
          ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
          ctx.fill();
        });

        // ship
        if (
          ship.invincible === 0 ||
          Math.floor(ship.invincible / 5) % 2 === 0
        ) {
          ctx.save();
          ctx.translate(ship.x, ship.y);
          ctx.rotate(ship.angle);
          ctx.strokeStyle = panicMode ? "#f87171" : "#60a5fa";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(0, -16);
          ctx.lineTo(10, 12);
          ctx.lineTo(0, 7);
          ctx.lineTo(-10, 12);
          ctx.closePath();
          ctx.stroke();
          // face
          ctx.fillStyle = panicMode ? "#f87171" : "#60a5fa";
          ctx.font = "10px serif";
          ctx.textAlign = "center";
          ctx.fillText(panicMode ? "😰" : "🚀", 0, 3);
          ctx.restore();
        }

        // panic message
        if (panicMsgTimer > 0) {
          ctx.save();
          ctx.globalAlpha = Math.min(1, panicMsgTimer / 20);
          ctx.font = `bold ${16 + Math.random() * 4}px Syne, sans-serif`;
          ctx.fillStyle = "#f87171";
          ctx.textAlign = "center";
          ctx.fillText(panicMsg, ship.x, ship.y - 30);
          ctx.restore();
        }
      }

      function die() {
        running = false;
        const titles =
          score < 100
            ? "The ship gave up."
            : score < 500
              ? "Decent panic run."
              : score < 1000
                ? "Surprisingly good!"
                : "The panic was worth it.";
        document.getElementById("deadTitle").textContent = titles;
        document.getElementById("deadSub").textContent =
          `Score: ${score} · Level: ${level}`;
        document.getElementById("deadOverlay").classList.add("show");
      }

      function updateHud() {
        document.getElementById("scoreHud").textContent = score;
        document.getElementById("livesHud").textContent = lives;
        document.getElementById("levelHud").textContent = level;
      }

      document.addEventListener("keydown", (e) => {
        keys[e.key] = true;
        if (e.key === " ") e.preventDefault();
      });
      document.addEventListener("keyup", (e) => {
        keys[e.key] = false;
      });
    </script>
  </body>
</html>
