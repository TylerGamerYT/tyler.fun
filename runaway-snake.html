<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runaway Snake | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #020617; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; overflow: hidden; user-select: none; }
        .back-home { position: fixed; top: 20px; left: 24px; font-size: 0.85rem; color: #475569; text-decoration: none; transition: color 0.2s; z-index: 10; }
        .back-home:hover { color: #fff; }
        .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 16px 24px; width: 100%; }
        h1 { font-family: 'Syne', sans-serif; font-size: clamp(1.6rem,6vw,2.4rem); font-weight: 900; margin: 0 0 3px; letter-spacing: -1px; }
        .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 12px; }
        .hud { display: flex; gap: 24px; margin-bottom: 10px; }
        .hud-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .hud-val { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 900; color: #f8fafc; }
        .hud-label { font-size: 0.65rem; color: #475569; text-transform: uppercase; letter-spacing: 1.5px; }
        canvas#game { display: block; border-radius: 14px; border: 1px solid rgba(51,65,85,0.7); background: rgba(5,10,30,0.95); touch-action: none; }

        .overlay { position: fixed; inset: 0; background: rgba(2,6,23,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .overlay.show { opacity: 1; pointer-events: all; }
        .ov-emoji { font-size: 3.5rem; margin-bottom: 10px; }
        .ov-title { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem,6vw,2.6rem); font-weight: 900; margin: 0 0 8px; }
        .ov-sub { color: #64748b; font-size: 0.95rem; margin-bottom: 24px; }
        .ov-sub span { color: #60a5fa; font-weight: 700; }
        .ov-btn { padding: 12px 32px; background: rgba(37,99,235,0.3); border: 1.5px solid rgba(96,165,250,0.45); border-radius: 999px; color: #fff; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .ov-btn:hover { background: rgba(37,99,235,0.5); }

        .controls-hint { font-size: 0.75rem; color: #334155; margin-top: 8px; }
    </style>
</head>
<body>
<a href="index.html" class="back-home">← Back to tyler.fun</a>

<div class="overlay show" id="startOverlay">
    <div class="ov-emoji">🐍</div>
    <div class="ov-title">Runaway Snake</div>
    <div class="ov-sub">Classic snake — but the <span>food runs away</span> from you.</div>
    <button class="ov-btn" onclick="startGame()">Play</button>
</div>

<div class="overlay" id="gameOverlay">
    <div class="ov-emoji">💀</div>
    <div class="ov-title" id="ovTitle">You died.</div>
    <div class="ov-sub">Score: <span id="ovScore">0</span> · Length: <span id="ovLen">1</span></div>
    <button class="ov-btn" onclick="startGame()">Try again</button>
</div>

<div class="container">
    <h1>Runaway Snake</h1>
    <p class="subtitle">The food doesn't want to be eaten.</p>
    <div class="hud">
        <div class="hud-stat"><div class="hud-val" id="scoreHud">0</div><div class="hud-label">score</div></div>
        <div class="hud-stat"><div class="hud-val" id="lenHud">1</div><div class="hud-label">length</div></div>
        <div class="hud-stat"><div class="hud-val" id="bestHud">0</div><div class="hud-label">best</div></div>
    </div>
    <canvas id="game"></canvas>
    <p class="controls-hint">Arrow keys / WASD · Swipe on mobile</p>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const CELL = 20;
let COLS, ROWS, W, H;

function resize() {
    const maxW = Math.min(window.innerWidth - 32, 480);
    const maxH = Math.min(window.innerHeight - 200, 420);
    COLS = Math.floor(maxW / CELL);
    ROWS = Math.floor(maxH / CELL);
    W = canvas.width  = COLS * CELL;
    H = canvas.height = ROWS * CELL;
}
resize();
window.addEventListener('resize', () => { resize(); if (!running) drawIdle(); });

let snake, dir, nextDir, food, foodDir, score, running, animId, best = 0;
let stepInterval = null;

function startGame() {
    document.getElementById('startOverlay').classList.remove('show');
    document.getElementById('gameOverlay').classList.remove('show');

    snake = [{ x: Math.floor(COLS/2), y: Math.floor(ROWS/2) }];
    dir = { x:1, y:0 }; nextDir = { x:1, y:0 };
    score = 0; running = true;
    spawnFood();
    updateHud();

    clearInterval(stepInterval);
    stepInterval = setInterval(step, 120);
    if (animId) cancelAnimationFrame(animId);
    drawLoop();
}

function spawnFood() {
    do {
        food = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
    } while (snake.some(s => s.x===food.x && s.y===food.y));
    // initial food direction — random
    foodDir = { x: Math.random()<0.5?1:-1, y: 0 };
}

function step() {
    if (!running) return;
    dir = { ...nextDir };

    // move snake
    const head = { x: (snake[0].x + dir.x + COLS) % COLS, y: (snake[0].y + dir.y + ROWS) % ROWS };

    // self collision
    if (snake.some(s => s.x===head.x && s.y===head.y)) { die(); return; }

    snake.unshift(head);

    // check eat
    if (head.x===food.x && head.y===food.y) {
        score += 10;
        if (score > best) best = score;
        updateHud();
        spawnFood();
    } else {
        snake.pop();
    }

    // move food — runs away from snake head
    moveFood();
}

function moveFood() {
    // every 2 steps, food moves
    const dx = food.x - snake[0].x;
    const dy = food.y - snake[0].y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 8) {
        // flee
        const mx = Math.abs(dx) > Math.abs(dy) ? (dx>0?1:-1) : 0;
        const my = Math.abs(dy) >= Math.abs(dx) ? (dy>0?1:-1) : 0;
        let nx = (food.x + mx + COLS) % COLS;
        let ny = (food.y + my + ROWS) % ROWS;
        if (!snake.some(s=>s.x===nx&&s.y===ny)) { food.x=nx; food.y=ny; }
        else {
            // try other directions
            for (const [fx,fy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
                nx = (food.x+fx+COLS)%COLS; ny=(food.y+fy+ROWS)%ROWS;
                if (!snake.some(s=>s.x===nx&&s.y===ny)) { food.x=nx; food.y=ny; break; }
            }
        }
    } else if (Math.random() < 0.3) {
        // wander randomly
        const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
        const [fx,fy] = dirs[Math.floor(Math.random()*4)];
        const nx=(food.x+fx+COLS)%COLS, ny=(food.y+fy+ROWS)%ROWS;
        if (!snake.some(s=>s.x===nx&&s.y===ny)) { food.x=nx; food.y=ny; }
    }
}

function die() {
    running = false;
    clearInterval(stepInterval);
    const titles = score<30?'You died.':score<80?'Not bad!':score<150?'Snake master!':'Legendary.';
    document.getElementById('ovTitle').textContent = titles;
    document.getElementById('ovScore').textContent = score;
    document.getElementById('ovLen').textContent = snake.length;
    setTimeout(() => document.getElementById('gameOverlay').classList.add('show'), 400);
}

function drawLoop() {
    draw();
    if (running) animId = requestAnimationFrame(drawLoop);
}

function drawIdle() {
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='rgba(30,58,138,0.05)';
    for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) { ctx.fillRect(x*CELL,y*CELL,CELL-1,CELL-1); }
}

function draw() {
    ctx.clearRect(0,0,W,H);

    // grid
    ctx.fillStyle='rgba(255,255,255,0.015)';
    for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) ctx.fillRect(x*CELL+1,y*CELL+1,CELL-2,CELL-2);

    // snake
    snake.forEach((seg,i) => {
        const alpha = 1 - (i / snake.length) * 0.6;
        ctx.fillStyle = i===0 ? '#60a5fa' : `rgba(59,130,246,${alpha})`;
        ctx.beginPath();
        ctx.roundRect(seg.x*CELL+2, seg.y*CELL+2, CELL-4, CELL-4, i===0?6:4);
        ctx.fill();
    });

    // food (panicking emoji style)
    ctx.font = `${CELL-2}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🍎', food.x*CELL+CELL/2, food.y*CELL+CELL/2+1);
}

function updateHud() {
    document.getElementById('scoreHud').textContent = score;
    document.getElementById('lenHud').textContent = snake.length;
    document.getElementById('bestHud').textContent = best;
}

// keyboard
const DIRS = { ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0} };
document.addEventListener('keydown', e => {
    const d = DIRS[e.key];
    if (!d) return;
    e.preventDefault();
    if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
});

// swipe
let touchStart = null;
canvas.addEventListener('touchstart', e => { touchStart = {x:e.touches[0].clientX,y:e.touches[0].clientY}; }, {passive:true});
canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if (Math.abs(dx) > Math.abs(dy)) nextDir = dx>0?{x:1,y:0}:{x:-1,y:0};
    else nextDir = dy>0?{x:0,y:1}:{x:0,y:-1};
    touchStart = null;
}, {passive:true});

drawIdle();
</script>
</body>
</html>
