<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support | tyler.fun</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; }

body {
    background: #020617;
    color: #fff;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    margin: 0;
    overflow-x: hidden;
}

#particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

.bg-glow {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, #0c3a2233 0%, transparent 70%);
    z-index: 0;
    pointer-events: none;
}

.back-home {
    position: fixed;
    top: 20px;
    left: 24px;
    font-size: 0.85rem;
    color: #475569;
    text-decoration: none;
    z-index: 10;
}
.back-home:hover { color: #fff; }

.container {
    position: relative;
    z-index: 1;
    padding: 80px 24px 60px;
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
}

/* banner */
.banner {
    width: 100%;
    height: 140px;
    border-radius: 20px;
    background: linear-gradient(135deg, #052e16 0%, #065f46 50%, #0f172a 100%);
    margin-bottom: -44px;
    position: relative;
    border: 1px solid rgba(16,185,129,0.25);
    overflow: hidden;
}

.banner-pattern {
    position: absolute;
    inset: 0;
    opacity: 0.25;
    background-image:
        radial-gradient(circle at 15% 50%, #10b981 0%, transparent 50%),
        radial-gradient(circle at 80% 25%, #34d399 0%, transparent 45%),
        radial-gradient(circle at 50% 90%, #059669 0%, transparent 40%);
}

.banner-label {
    position: absolute;
    bottom: 14px;
    right: 20px;
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: rgba(16,185,129,0.4);
}

/* avatar */
.avatar-wrap { padding: 0 24px; position: relative; z-index: 2; }

.avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 4px solid #020617;
    background: linear-gradient(135deg, #052e16, #065f46);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8rem;
}

/* profile */
.profile-info { padding: 12px 24px 24px; }

.name-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.display-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 900;
}

/* RESTORED SUPPORT BADGE */
.badge-support {
    background: rgba(16,185,129,0.15);
    color: #10b981;
    border: 1px solid rgba(16,185,129,0.3);
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 3px 9px;
    border-radius: 99px;
}

/* CHECKMARK FIXED */
.vcheck {
    position: relative;
    display: inline-flex;
    align-items: center;
    transform: translateY(1px);
    cursor: pointer;
}

.vcheck svg {
    width: 18px;
    height: 18px;
    display: block;
}

.vcheck .tip {
    position: absolute;
    top: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15,23,42,0.97);
    border: 1px solid rgba(51,65,85,0.8);
    border-radius: 12px;
    padding: 12px 14px;
    white-space: nowrap;
    z-index: 9999;

    opacity: 0;
    pointer-events: none;
    transition: 0.15s ease;
}

.vcheck.active .tip {
    opacity: 1;
    pointer-events: auto;
}

.vcheck .tip b {
    font-family: "Syne", sans-serif;
    font-size: 0.9rem;
    font-weight: 900;
    display: block;
}

.vcheck .tip small {
    font-size: 0.78rem;
    color: #94a3b8;
}

/* rest unchanged */
.handle { font-size: 0.9rem; color: #475569; margin-bottom: 12px; }

.bio {
    font-size: 0.9rem;
    color: #94a3b8;
    line-height: 1.6;
    margin-bottom: 20px;
}

.stats-row {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(51,65,85,0.4);
}

.stat-item { display: flex; flex-direction: column; }

.stat-num {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
}

.section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 2px;
    color: #475569;
    margin-bottom: 14px;
}

.responsibility-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
}

.resp-item {
    display: flex;
    gap: 12px;
    background: rgba(15,23,42,0.65);
    border: 1px solid rgba(51,65,85,0.5);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 0.875rem;
    color: #cbd5e1;
}

.fish-note {
    background: rgba(16,185,129,0.07);
    border: 1px solid rgba(16,185,129,0.2);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    color: #64748b;
    display: flex;
    gap: 10px;
}

.coming-soon {
    background: rgba(15,23,42,0.65);
    border: 1px solid rgba(51,65,85,0.5);
    border-radius: 14px;
    padding: 20px 24px;
    text-align: center;
    color: #334155;
    font-size: 0.85rem;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<div class="bg-glow"></div>

<a href="index.html" class="back-home">← Back to tyler.fun</a>

<div class="container">

<div class="banner"></div>

<div class="avatar-wrap">
    <div class="avatar">🎧</div>
</div>

<div class="profile-info">

<div class="name-row">
    <span class="display-name">Support</span>

    <span class="vcheck">
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="12" fill="#1d9bf0"></circle>
            <path d="M9.6 16.2l-3.2-3.2 1.4-1.4 1.8 1.8 6.6-6.6 1.4 1.4z" fill="#fff"></path>
        </svg>

        <span class="tip">
            <b>Verified</b>
            <small>Account verified</small>
        </span>
    </span>

    <span class="badge-support">Support</span>
</div>

<div class="handle">@support</div>

<p class="bio">tyler.fun support • Bug reports, questions, and help.</p>

<div class="stats-row">
    <div class="stat-item"><div class="stat-num">0</div></div>
    <div class="stat-item"><div class="stat-num">∞</div></div>
</div>

<div class="section-title">Responsibilities</div>

<div class="responsibility-list">
    <div class="resp-item">🐛 Bug reports</div>
    <div class="resp-item">❓ Help & support</div>
    <div class="resp-item">🔁 Escalations</div>
</div>

<div class="fish-note">🐟 Fish approved.</div>

<div class="coming-soon">Account system coming eventually.</div>

</div>
</div>

<script>
document.querySelectorAll('.vcheck').forEach(el => {
    el.addEventListener('click', e => {
        e.stopPropagation();
        el.classList.toggle('active');
    });
});

document.addEventListener('click', () => {
    document.querySelectorAll('.vcheck').forEach(v => v.classList.remove('active'));
});
</script>
</body>
</html>
