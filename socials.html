    <title>Socials | tyler.fun</title>
    <style>
        body {
            background: radial-gradient(circle at center, #1e3a8a 0%, #020617 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .links-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: center;
            padding: 20px;
        }

        .profile-pic {
            width: 90px;
            height: 90px;
            background: #1e3a8a;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 3px solid #60a5fa;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 2rem;
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
        }

        h2 { 
            margin: 0 0 5px 0; 
            font-weight: 800; 
            font-size: 1.8rem;
            letter-spacing: -1px; 
        }

        .username {
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(30, 58, 138, 0.4);
            border: 1.5px solid rgba(209, 213, 219, 0.2);
            padding: 16px;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .social-link:hover {
            transform: translateY(-2px);
            background: rgba(30, 58, 138, 0.7);
            border-color: #ffffff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .social-link svg { 
            width: 24px; 
            height: 24px; 
        }
        
        /* Brand Colors & Effects */
        .twitter svg { fill: #1da1f2; }
        
        .insta svg { fill: url(#instaGradient); }
        
        .tiktok svg { 
            filter: drop-shadow(2px 0px 0px #ff0050) drop-shadow(-2px 0px 0px #00f2ea); 
        }

        .back-home {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-home:hover {
            color: #ffffff;
        }
    </style>
</head>
