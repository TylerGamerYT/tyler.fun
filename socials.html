    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background: #020617;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 40%, #1e3a8a44 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .links-container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            text-align: center;
            padding: 32px 20px;
        }

        /* --- PFP --- */
        .profile-pic {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            margin-bottom: 16px;
            border: 2.5px solid #60a5fa;
            overflow: hidden;
            box-shadow: 0 0 24px rgba(96, 165, 250, 0.25);
            background: #1e3a8a;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.1s;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h2 {
            font-family: 'Syne', sans-serif;
            margin: 0 0 4px;
            font-weight: 900;
            font-size: 1.75rem;
            letter-spacing: -1px;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.2s;
        }

        .username {
            color: #64748b;
            margin-bottom: 28px;
            font-size: 0.9rem;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.3s;
        }

        /* --- LINKS --- */
        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 11px;
            background: rgba(30, 58, 138, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 100%;
            margin-bottom: 12px;
            opacity: 0;
        }

        .social-link:hover {
            transform: translateY(-2px);
            background: rgba(30, 58, 138, 0.6);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }

        .social-link:active { transform: translateY(0px); }

        .social-link svg { width: 22px; height: 22px; flex-shrink: 0; }

        /* per-platform colours */
        .tiktok svg  { filter: drop-shadow(1.5px 0 0 #ff0050) drop-shadow(-1.5px 0 0 #00f2ea); }
        .twitter svg { fill: #1d9bf0; }
        .insta svg   { fill: url(#instaGradient); }
        .github svg  { fill: #e6edf3; }

        /* staggered reveals */
        .link-1 { animation: fadeUp 0.5s ease forwards 0.4s; }
        .link-2 { animation: fadeUp 0.5s ease forwards 0.5s; }
        .link-3 { animation: fadeUp 0.5s ease forwards 0.6s; }
        .link-4 { animation: fadeUp 0.5s ease forwards 0.7s; }

        .back-home {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #475569;
            text-decoration: none;
            transition: color 0.2s;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.85s;
        }

        .back-home:hover { color: #ffffff; }

        @keyframes fadeUp {
            0%   { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>

<script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function initStars() {
        stars = [];
        const count = Math.floor((W * H) / 8000);
        for (let i = 0; i < count; i++) {
            stars.push({
                x: Math.random() * W,
                y: Math.random() * H,
                r: Math.random() * 1.1 + 0.3,
                speed: Math.random() * 0.14 + 0.03,
                opacity: Math.random() * 0.45 + 0.1,
                twinkleSpeed: Math.random() * 0.01 + 0.003,
                twinkleOffset: Math.random() * Math.PI * 2,
            });
        }
    }

    let t = 0;
    function draw() {
        ctx.clearRect(0, 0, W, H);
        t += 0.016;
        for (const s of stars) {
            const alpha = s.opacity + Math.sin(t * s.twinkleSpeed * 60 + s.twinkleOffset) * 0.14;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(148, 197, 255, ${Math.max(0, alpha)})`;
            ctx.fill();
            s.y -= s.speed;
            if (s.y < -2) { s.y = H + 2; s.x = Math.random() * W; }
        }
        requestAnimationFrame(draw);
    }

    resize();
    initStars();
    draw();
    window.addEventListener('resize', () => { resize(); initStars(); });
</script>
