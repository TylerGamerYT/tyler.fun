<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Memory | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #020617; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; overflow: hidden; }
        #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 40%, #1e3a8a44 0%, transparent 70%); z-index: 0; pointer-events: none; }
        .back-home { position: fixed; top: 20px; left: 24px; font-size: 0.85rem; color: #475569; text-decoration: none; transition: color 0.2s; z-index: 10; }
        .back-home:hover { color: #fff; }
        .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; max-width: 560px; width: 100%; }
        h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem,8vw,3rem); font-weight: 900; margin: 0 0 6px; letter-spacing: -2px; }
        .subtitle { font-size: 0.95rem; color: #64748b; margin-bottom: 36px; }

        .level-badge { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #60a5fa; margin-bottom: 12px; }

        /* number display */
        .number-display {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3rem,14vw,6rem);
            font-weight: 900; letter-spacing: 6px; line-height: 1;
            color: #f8fafc; margin-bottom: 12px;
            min-height: 1.2em;
            transition: opacity 0.3s, transform 0.3s;
        }
        .number-display.hidden { opacity: 0; transform: scale(0.9); }

        /* countdown */
        .countdown { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: #475569; margin-bottom: 32px; min-height: 24px; }
        .countdown.urgent { color: #f87171; }

        /* input */
        .input-wrap { width: 100%; margin-bottom: 16px; position: relative; }
        .num-input {
            width: 100%; padding: 16px 20px;
            background: rgba(30,58,138,0.2); border: 1.5px solid rgba(96,165,250,0.3);
            border-radius: 14px; color: #fff;
            font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 700;
            text-align: center; outline: none; letter-spacing: 4px;
            transition: border-color 0.2s, background 0.2s;
        }
        .num-input:focus { border-color: #60a5fa; }
        .num-input.correct { border-color: #10b981; background: rgba(16,185,129,0.1); }
        .num-input.wrong   { border-color: #ef4444; background: rgba(239,68,68,0.1); animation: inputShake 0.3s ease; }
        @keyframes inputShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

        .submit-btn {
            width: 100%; padding: 14px;
            background: rgba(37,99,235,0.25); border: 1.5px solid rgba(96,165,250,0.4);
            border-radius: 14px; color: #fff;
            font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: background 0.2s; margin-bottom: 24px;
        }
        .submit-btn:hover { background: rgba(37,99,235,0.45); }
        .submit-btn:disabled { opacity: 0.3; cursor: default; }

        .feedback { font-size: 1rem; min-height: 24px; transition: color 0.3s; }
        .feedback.good { color: #10b981; }
        .feedback.bad  { color: #f87171; }

        .best-row { margin-top: 24px; font-size: 0.85rem; color: #334155; }
        .best-row span { color: #60a5fa; font-weight: 700; }

        .gameover { position: fixed; inset: 0; background: rgba(2,6,23,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.4s; backdrop-filter: blur(8px); }
        .gameover.show { opacity: 1; pointer-events: all; }
        .go-emoji { font-size: 4rem; margin-bottom: 12px; }
        .go-title { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem,7vw,2.8rem); font-weight: 900; margin: 0 0 8px; }
        .go-sub { color: #64748b; font-size: 1rem; margin-bottom: 6px; }
        .go-answer { color: #f87171; font-size: 0.9rem; margin-bottom: 24px; font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: 3px; }
        .go-btn { padding: 13px 36px; background: rgba(37,99,235,0.3); border: 1.5px solid rgba(96,165,250,0.45); border-radius: 999px; color: #fff; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .go-btn:hover { background: rgba(37,99,235,0.5); }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="bg-glow"></div>
<a href="index.html" class="back-home">← Back to tyler.fun</a>

<div class="gameover" id="gameover">
    <div class="go-emoji">🧠</div>
    <div class="go-title" id="goTitle">Wrong!</div>
    <div class="go-sub" id="goSub">The number was:</div>
    <div class="go-answer" id="goAnswer"></div>
    <button class="go-btn" onclick="startGame()">Try again</button>
</div>

<div class="container">
    <h1>Number Memory</h1>
    <p class="subtitle">Remember the number. It gets longer every round.</p>

    <div class="level-badge" id="levelBadge">Level 1 · 3 digits</div>
    <div class="number-display" id="numDisplay">—</div>
    <div class="countdown" id="countdown"></div>

    <div class="input-wrap">
        <input type="tel" class="num-input" id="numInput" placeholder="—" maxlength="20" disabled />
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitAnswer()" disabled>Submit</button>
    <div class="feedback" id="feedback"></div>
    <div class="best-row">Personal best: <span id="bestDisplay">—</span> digits</div>
</div>

<script>
let level = 1, currentNumber = '', phase = 'show';
let countdownInterval = null;
let best = parseInt(localStorage.getItem('nummem_best') || '0');

document.getElementById('bestDisplay').textContent = best || '—';

document.getElementById('numInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitAnswer();
});

function startGame() {
    level = 1;
    document.getElementById('gameover').classList.remove('show');
    nextRound();
}

function nextRound() {
    const digits = 2 + level;
    document.getElementById('levelBadge').textContent = `Level ${level} · ${digits} digits`;
    document.getElementById('numInput').value = '';
    document.getElementById('numInput').disabled = true;
    document.getElementById('numInput').className = 'num-input';
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';

    // generate number
    currentNumber = '';
    for (let i = 0; i < digits; i++) currentNumber += Math.floor(Math.random() * 10);

    // show number
    const display = document.getElementById('numDisplay');
    display.classList.remove('hidden');
    display.textContent = currentNumber;
    phase = 'show';

    // countdown to hide
    const showTime = Math.max(1500, 4000 - level * 200);
    let remaining = showTime;
    clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
        remaining -= 100;
        const secs = (remaining / 1000).toFixed(1);
        const cd = document.getElementById('countdown');
        cd.textContent = `Hiding in ${secs}s`;
        cd.className = 'countdown' + (remaining < 1500 ? ' urgent' : '');
        if (remaining <= 0) {
            clearInterval(countdownInterval);
            hideNumber();
        }
    }, 100);
}

function hideNumber() {
    const display = document.getElementById('numDisplay');
    display.classList.add('hidden');
    document.getElementById('countdown').textContent = 'What was the number?';
    document.getElementById('countdown').className = 'countdown';
    setTimeout(() => {
        display.textContent = '?';
        display.classList.remove('hidden');
        document.getElementById('numInput').disabled = false;
        document.getElementById('numInput').focus();
        document.getElementById('submitBtn').disabled = false;
        phase = 'recall';
    }, 300);
}

function submitAnswer() {
    if (phase !== 'recall') return;
    const guess = document.getElementById('numInput').value.trim();
    const input = document.getElementById('numInput');
    const feedback = document.getElementById('feedback');

    if (guess === currentNumber) {
        input.className = 'num-input correct';
        feedback.textContent = `✓ Correct! +${level * 10} points`;
        feedback.className = 'feedback good';
        level++;
        const digits = 2 + level - 1;
        if (digits > best) {
            best = digits;
            localStorage.setItem('nummem_best', best);
            document.getElementById('bestDisplay').textContent = best;
        }
        phase = 'waiting';
        clearInterval(countdownInterval);
        document.getElementById('countdown').textContent = 'Next round in 1s...';
        setTimeout(nextRound, 1000);
    } else {
        input.className = 'num-input wrong';
        feedback.textContent = '✗ Wrong!';
        feedback.className = 'feedback bad';
        phase = 'done';
        clearInterval(countdownInterval);
        setTimeout(() => {
            document.getElementById('goTitle').textContent = level < 3 ? 'Brain empty.' : level < 6 ? 'Not bad!' : level < 10 ? 'Impressive!' : 'Absolute legend.';
            document.getElementById('goSub').textContent = `You got to level ${level} (${1+level} digits). The number was:`;
            document.getElementById('goAnswer').textContent = currentNumber;
            document.getElementById('gameover').classList.add('show');
        }, 800);
    }
}

startGame();

const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
let W, H, stars = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
function initStars() { stars = []; for(let i=0;i<Math.floor((W*H)/8000);i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.3,speed:Math.random()*0.14+0.03,opacity:Math.random()*0.45+0.1,ts:Math.random()*0.01+0.003,to:Math.random()*Math.PI*2}); }
let t=0;
function draw() { ctx.clearRect(0,0,W,H); t+=0.016; for(const s of stars){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(148,197,255,${Math.max(0,s.opacity+Math.sin(t*s.ts*60+s.to)*0.14)})`;ctx.fill();s.y-=s.speed;if(s.y<-2){s.y=H+2;s.x=Math.random()*W;}} requestAnimationFrame(draw); }
resize(); initStars(); draw();
window.addEventListener('resize',()=>{resize();initStars();});
</script>
</body>
</html>
