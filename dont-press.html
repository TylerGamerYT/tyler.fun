<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don't Press the Button | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #020617; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; overflow: hidden; transition: background 0.5s; }
        #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 40%, #1e3a8a44 0%, transparent 70%); z-index: 0; pointer-events: none; transition: background 0.5s; }
        .back-home { position: fixed; top: 20px; left: 24px; font-size: 0.85rem; color: #475569; text-decoration: none; transition: color 0.2s; z-index: 10; }
        .back-home:hover { color: #fff; }
        .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; max-width: 600px; width: 100%; }
        h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem,8vw,3rem); font-weight: 900; margin: 0 0 6px; letter-spacing: -2px; }
        .subtitle { font-size: 0.95rem; color: #64748b; margin-bottom: 36px; }

        .press-count { font-family: 'Syne', sans-serif; font-size: 1rem; color: #475569; margin-bottom: 28px; }
        .press-count span { color: #f87171; font-weight: 700; }

        /* THE BUTTON */
        .red-btn {
            width: 180px; height: 180px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #f87171, #dc2626);
            border: 4px solid #991b1b;
            box-shadow: 0 8px 0 #7f1d1d, 0 0 40px rgba(239,68,68,0.3);
            cursor: pointer;
            font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 900;
            color: #fff; letter-spacing: 1px;
            transition: transform 0.1s, box-shadow 0.1s;
            position: relative;
            margin-bottom: 40px;
        }
        .red-btn:hover { box-shadow: 0 8px 0 #7f1d1d, 0 0 60px rgba(239,68,68,0.5); transform: scale(1.03); }
        .red-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #7f1d1d, 0 0 40px rgba(239,68,68,0.3); }

        /* consequence box */
        .consequence {
            background: rgba(15,23,42,0.7); border: 1px solid rgba(51,65,85,0.7);
            border-radius: 18px; padding: 24px 28px; width: 100%;
            backdrop-filter: blur(14px); min-height: 100px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 8px;
        }
        .consequence-emoji { font-size: 2.5rem; transition: opacity 0.3s; }
        .consequence-text { font-size: 1.05rem; color: #cbd5e1; line-height: 1.5; transition: opacity 0.3s; }
        .consequence-text.fade { opacity: 0; }

        /* overlays for chaos */
        .overlay { position: fixed; inset: 0; z-index: 8; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
        .overlay.show { opacity: 1; }
        #shakeOverlay { background: transparent; }
        #confetti-container { position: fixed; inset: 0; z-index: 9; pointer-events: none; overflow: hidden; }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="bg-glow" id="bgGlow"></div>
<div id="confetti-container"></div>
<a href="index.html" class="back-home">← Back to tyler.fun</a>

<div class="container">
    <h1>Don't Press It</h1>
    <p class="subtitle">There is a button. You should not press it.</p>
    <p class="press-count">Times pressed: <span id="pressCount">0</span></p>

    <button class="red-btn" id="redBtn" onclick="pressButton()">DO NOT<br>PRESS</button>

    <div class="consequence">
        <div class="consequence-emoji" id="consEmoji">🔴</div>
        <div class="consequence-text" id="consText">I'm warning you. Don't do it.</div>
    </div>
</div>

<script>
let presses = 0;

const events = [
    { emoji:'😐', text:'I said don\'t.', bg: null },
    { emoji:'😑', text:'You pressed it. Of course you pressed it.', bg: null },
    { emoji:'🙄', text:'Incredible. Truly. The nerve.', bg: null },
    { emoji:'😤', text:'Fine. Keep going. See what happens.', bg: null, action: () => shakeScreen() },
    { emoji:'😡', text:'You want chaos? You\'re getting chaos.', bg: '#1a0a0a', action: () => flashRed() },
    { emoji:'🤯', text:'THE SCREEN IS TURNING RED AND IT\'S YOUR FAULT.', bg: '#2a0505', action: () => flashRed() },
    { emoji:'🎉', text:'Wait actually... confetti?? You unlocked confetti somehow.', bg: null, action: () => launchConfetti() },
    { emoji:'😭', text:'I worked so hard on this website and this is what you do.', bg: null },
    { emoji:'🌀', text:'Everything is spinning now. Are you happy?', bg: null, action: () => spinPage() },
    { emoji:'😰', text:'Please. I\'m begging you. Stop pressing the button.', bg: null },
    { emoji:'💀', text:'You\'ve pressed it 11 times. Eleven. That\'s not normal behaviour.', bg: null },
    { emoji:'🔥', text:'The website is on fire now. Metaphorically. (Please don\'t actually set fire to anything.)', bg: '#1a0800', action: () => flashOrange() },
    { emoji:'👁️', text:'I\'m watching you. I\'ve always been watching.', bg: null, action: () => eyeFollow() },
    { emoji:'🤖', text:'INITIATING CONSEQUENCES... just kidding. But seriously stop.', bg: null },
    { emoji:'🌮', text:'You get a taco. You don\'t deserve it but here you go. 🌮', bg: null },
    { emoji:'🥲', text:'I\'ve accepted my fate. Press away. I\'ll just be here. Crying.', bg: null },
    { emoji:'🎸', text:'You know what, respect. Most people stop at 3. You\'re still here.', bg: null, action: () => launchConfetti() },
    { emoji:'😮', text:'Okay wait — are you actually trying to break this? Because you might.', bg: null },
    { emoji:'💣', text:'This button is now a bomb. It\'s always been a bomb. Tick tock.', bg: '#1a0a00', action: () => shakeScreen() },
    { emoji:'🏆', text:'20 presses. You\'ve won absolutely nothing. Congratulations champion.', bg: null, action: () => launchConfetti() },
];

const loopEvents = [
    { emoji:'😶', text:'Still going huh.', bg: null },
    { emoji:'🤷', text:'At this point I respect the commitment.', bg: null },
    { emoji:'🧘', text:'I\'ve found inner peace. Have you?', bg: null },
    { emoji:'🌈', text:'You unlocked: a rainbow. (You didn\'t.)', bg: null, action: () => flashRainbow() },
    { emoji:'🛸', text:'Aliens are watching you press this button. They\'re confused too.', bg: null },
    { emoji:'📞', text:'Your mum called. She says to stop pressing the button.', bg: null },
    { emoji:'😴', text:'I\'m going to sleep. Wake me when you\'re done.', bg: null },
    { emoji:'🎲', text:'Random number: ' + Math.floor(Math.random()*9999) + '. You\'re welcome.', bg: null },
];

function pressButton() {
    presses++;
    document.getElementById('pressCount').textContent = presses;

    const ev = presses <= events.length
        ? events[presses - 1]
        : loopEvents[(presses - events.length - 1) % loopEvents.length];

    const textEl = document.getElementById('consText');
    const emojiEl = document.getElementById('consEmoji');
    textEl.classList.add('fade');
    setTimeout(() => {
        emojiEl.textContent = ev.emoji;
        textEl.textContent = ev.text;
        textEl.classList.remove('fade');
    }, 250);

    if (ev.bg) document.body.style.background = ev.bg;
    else document.body.style.background = '#020617';

    if (ev.action) ev.action();
}

function shakeScreen() {
    document.body.style.animation = 'none';
    document.body.offsetHeight;
    const style = document.createElement('style');
    style.textContent = '@keyframes bodyShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)} }';
    document.head.appendChild(style);
    document.body.style.animation = 'bodyShake 0.5s ease';
    setTimeout(() => { document.body.style.animation = ''; }, 500);
}

function flashRed() {
    document.body.style.background = '#3a0000';
    setTimeout(() => { document.body.style.background = '#020617'; }, 400);
}

function flashOrange() {
    document.body.style.background = '#3a1500';
    setTimeout(() => { document.body.style.background = '#020617'; }, 400);
}

function flashRainbow() {
    const colors = ['#1a0020','#001a20','#001a00','#1a1a00','#1a0000'];
    let i = 0;
    const iv = setInterval(() => {
        document.body.style.background = colors[i % colors.length];
        i++;
        if (i > 6) { clearInterval(iv); document.body.style.background = '#020617'; }
    }, 120);
}

function spinPage() {
    const container = document.querySelector('.container');
    container.style.transition = 'transform 0.5s ease';
    container.style.transform = 'rotate(5deg)';
    setTimeout(() => { container.style.transform = 'rotate(-5deg)'; }, 500);
    setTimeout(() => { container.style.transform = 'rotate(0deg)'; }, 1000);
}

function eyeFollow() {
    const btn = document.getElementById('redBtn');
    btn.textContent = '👁️';
    setTimeout(() => { btn.innerHTML = 'DO NOT<br>PRESS'; }, 2000);
}

function launchConfetti() {
    const container = document.getElementById('confetti-container');
    const colors = ['#60a5fa','#f87171','#fbbf24','#10b981','#a78bfa','#fb923c'];
    for (let i = 0; i < 60; i++) {
        const p = document.createElement('div');
        p.style.cssText = `position:absolute;width:8px;height:8px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}%;top:-10px;border-radius:${Math.random()<0.5?'50%':'2px'};animation:fall${Math.floor(Math.random()*3)} ${1+Math.random()*2}s linear forwards;opacity:${0.7+Math.random()*0.3};transform:rotate(${Math.random()*360}deg)`;
        container.appendChild(p);
        setTimeout(() => p.remove(), 3000);
    }
    const style = document.createElement('style');
    style.textContent = `
        @keyframes fall0{to{transform:translateY(110vh) rotate(360deg);opacity:0}}
        @keyframes fall1{to{transform:translateY(110vh) rotate(-720deg);opacity:0}}
        @keyframes fall2{to{transform:translateY(110vh) rotate(180deg);opacity:0}}
    `;
    document.head.appendChild(style);
}

// particles
const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
let W, H, stars = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
function initStars() { stars = []; for(let i=0;i<Math.floor((W*H)/8000);i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.3,speed:Math.random()*0.14+0.03,opacity:Math.random()*0.45+0.1,ts:Math.random()*0.01+0.003,to:Math.random()*Math.PI*2}); }
let t=0;
function draw() { ctx.clearRect(0,0,W,H); t+=0.016; for(const s of stars){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(148,197,255,${Math.max(0,s.opacity+Math.sin(t*s.ts*60+s.to)*0.14)})`;ctx.fill();s.y-=s.speed;if(s.y<-2){s.y=H+2;s.x=Math.random()*W;}} requestAnimationFrame(draw); }
resize(); initStars(); draw();
window.addEventListener('resize',()=>{resize();initStars();});
</script>
</body>
</html>
