<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS vs AI | tyler.fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #020617; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; overflow: hidden; user-select: none; }
        #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 40%, #1e3a8a44 0%, transparent 70%); z-index: 0; pointer-events: none; }
        .back-home { position: fixed; top: 20px; left: 24px; font-size: 0.85rem; color: #475569; text-decoration: none; transition: color 0.2s; z-index: 10; }
        .back-home:hover { color: #fff; }
        .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; max-width: 560px; width: 100%; }
        h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem,8vw,3rem); font-weight: 900; margin: 0 0 6px; letter-spacing: -2px; }
        .subtitle { font-size: 0.95rem; color: #64748b; margin-bottom: 28px; }

        /* score */
        .scoreboard {
            display: flex; gap: 0; width: 100%; margin-bottom: 28px;
            background: rgba(15,23,42,0.7); border: 1px solid rgba(51,65,85,0.6);
            border-radius: 16px; overflow: hidden; backdrop-filter: blur(14px);
        }
        .score-cell { flex: 1; padding: 16px 12px; }
        .score-cell + .score-cell { border-left: 1px solid rgba(51,65,85,0.5); }
        .score-val { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 900; }
        .score-val.you { color: #60a5fa; }
        .score-val.ai  { color: #f87171; }
        .score-val.tie { color: #94a3b8; }
        .score-label { font-size: 0.7rem; color: #475569; text-transform: uppercase; letter-spacing: 1.5px; }

        /* arena */
        .arena { display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 24px; min-height: 120px; }
        .player-choice { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .choice-emoji { font-size: 4rem; transition: transform 0.3s; min-height: 64px; }
        .choice-emoji.reveal { animation: choiceReveal 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes choiceReveal { 0%{transform:scale(0) rotate(-20deg)} 100%{transform:scale(1) rotate(0)} }
        .choice-label { font-size: 0.75rem; color: #475569; text-transform: uppercase; letter-spacing: 1.5px; }
        .vs-label { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 900; color: #334155; }

        /* result */
        .result-text { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 900; min-height: 36px; margin-bottom: 8px; transition: color 0.3s; }
        .result-text.win  { color: #10b981; }
        .result-text.lose { color: #f87171; }
        .result-text.tie  { color: #94a3b8; }
        .ai-comment { font-size: 0.9rem; color: #475569; min-height: 20px; margin-bottom: 28px; font-style: italic; }

        /* buttons */
        .btn-row { display: flex; gap: 14px; }
        .rps-btn {
            width: 90px; height: 90px; border-radius: 20px;
            background: rgba(30,58,138,0.25); border: 1.5px solid rgba(51,65,85,0.6);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
            cursor: pointer; transition: background 0.15s, border-color 0.15s, transform 0.1s, box-shadow 0.15s;
            font-size: 2.2rem;
        }
        .rps-btn span { font-size: 0.65rem; color: #475569; text-transform: uppercase; letter-spacing: 1px; font-family: 'Inter', sans-serif; }
        .rps-btn:hover { background: rgba(37,99,235,0.35); border-color: rgba(96,165,250,0.5); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .rps-btn:active { transform: translateY(0); }
        .rps-btn:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }

        /* AI thinking indicator */
        .ai-thinking { font-size: 0.8rem; color: #334155; min-height: 18px; margin-bottom: 0; }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="bg-glow"></div>
<a href="/" class="back-home">← Back to tyler.fun</a>

<div class="container">
    <h1>RPS vs AI</h1>
    <p class="subtitle">The AI studies your patterns and tries to beat you.</p>

    <div class="scoreboard">
        <div class="score-cell"><div class="score-val you" id="youScore">0</div><div class="score-label">You</div></div>
        <div class="score-cell"><div class="score-val tie" id="tieScore">0</div><div class="score-label">Ties</div></div>
        <div class="score-cell"><div class="score-val ai"  id="aiScore">0</div><div class="score-label">AI</div></div>
    </div>

    <div class="arena">
        <div class="player-choice">
            <div class="choice-emoji" id="youEmoji">🤔</div>
            <div class="choice-label">You</div>
        </div>
        <div class="vs-label">VS</div>
        <div class="player-choice">
            <div class="choice-emoji" id="aiEmoji">🤖</div>
            <div class="choice-label">AI</div>
        </div>
    </div>

    <div class="result-text" id="resultText">Make your move</div>
    <div class="ai-comment" id="aiComment">I'm already learning your patterns.</div>

    <div class="btn-row">
        <button class="rps-btn" id="btnR" onclick="play('rock')">🪨<span>Rock</span></button>
        <button class="rps-btn" id="btnP" onclick="play('paper')">📄<span>Paper</span></button>
        <button class="rps-btn" id="btnS" onclick="play('scissors')">✂️<span>Scissors</span></button>
    </div>
    <div class="ai-thinking" id="aiThinking"></div>
</div>

<script>
const CHOICES = ['rock','paper','scissors'];
const EMOJI = { rock:'🪨', paper:'📄', scissors:'✂️' };
const BEATS = { rock:'scissors', scissors:'paper', paper:'rock' }; // key beats value

let scores = { you: 0, ai: 0, tie: 0 };
let history = []; // player moves
let round = 0;

// Markov chain: track what player plays after each previous move
let markov = { rock:{rock:0,paper:0,scissors:0}, paper:{rock:0,paper:0,scissors:0}, scissors:{rock:0,paper:0,scissors:0} };
let lastMove = null;

const winComments = ["Ha! Predicted that.", "Too easy.", "Called it.", "Did you really think I wouldn't see that?", "Predictable.", "I'm in your head.", "I knew you'd do that.", "Classic.", "Try something different.", "Your patterns are showing."];
const loseComments = ["Lucky.", "Hmm. Interesting.", "You surprised me. Once.", "Fine. Well played.", "I wasn't expecting that.", "Recalibrating...", "You got me. This time.", "Noted.", "Good move. Won't work twice.", "I'll remember that."];
const tieComments  = ["We think alike.", "Interesting.", "Great minds.", "Same wavelength.", "Mirror.", "Hmm.", "Again?", "We're tied. For now.", "Coincidence.", "Curious."];

function aiPredict() {
    // if we have history, use markov chain
    if (lastMove && round > 2) {
        const probs = markov[lastMove];
        const total = probs.rock + probs.paper + probs.scissors;
        if (total > 0) {
            // find what player is most likely to play
            let maxProb = 0, predicted = null;
            for (const m of CHOICES) {
                if (probs[m] > maxProb) { maxProb = probs[m]; predicted = m; }
            }
            if (predicted && maxProb / total > 0.3) {
                // play what beats the predicted move
                return CHOICES.find(c => BEATS[c] === predicted);
            }
        }
    }
    // fallback: random with slight bias toward countering last move
    if (lastMove && Math.random() < 0.4) {
        return CHOICES.find(c => BEATS[c] === lastMove);
    }
    return CHOICES[Math.floor(Math.random() * 3)];
}

function play(move) {
    round++;
    setButtons(true);

    // update markov
    if (lastMove) markov[lastMove][move]++;

    const aiMove = aiPredict();
    lastMove = move;
    history.push(move);

    // animate
    const youEl = document.getElementById('youEmoji');
    const aiEl  = document.getElementById('aiEmoji');
    youEl.textContent = '❓'; aiEl.textContent = '❓';
    youEl.className = 'choice-emoji'; aiEl.className = 'choice-emoji';

    setTimeout(() => {
        youEl.textContent = EMOJI[move];
        aiEl.textContent  = EMOJI[aiMove];
        youEl.className = 'choice-emoji reveal';
        aiEl.className  = 'choice-emoji reveal';

        let result, comment;
        if (move === aiMove) {
            result = 'tie'; scores.tie++;
            document.getElementById('resultText').textContent = 'Tie.';
            document.getElementById('resultText').className = 'result-text tie';
            comment = tieComments[Math.floor(Math.random()*tieComments.length)];
        } else if (BEATS[move] === aiMove) {
            result = 'win'; scores.you++;
            document.getElementById('resultText').textContent = 'You win!';
            document.getElementById('resultText').className = 'result-text win';
            comment = loseComments[Math.floor(Math.random()*loseComments.length)];
        } else {
            result = 'lose'; scores.ai++;
            document.getElementById('resultText').textContent = 'AI wins!';
            document.getElementById('resultText').className = 'result-text lose';
            comment = winComments[Math.floor(Math.random()*winComments.length)];
        }

        document.getElementById('aiComment').textContent = comment;
        updateScores();

        // AI gets smarter message
        const thinking = round < 5 ? 'Still learning your patterns...' : round < 10 ? 'Pattern recognition improving...' : round < 20 ? 'I know what you\'re going to do.' : 'I am inevitable.';
        document.getElementById('aiThinking').textContent = thinking;

        setTimeout(() => setButtons(false), 300);
    }, 400);
}

function setButtons(disabled) {
    ['btnR','btnP','btnS'].forEach(id => document.getElementById(id).disabled = disabled);
}

function updateScores() {
    document.getElementById('youScore').textContent = scores.you;
    document.getElementById('tieScore').textContent = scores.tie;
    document.getElementById('aiScore').textContent  = scores.ai;
}

const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
let W, H, stars = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
function initStars() { stars = []; for(let i=0;i<Math.floor((W*H)/8000);i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.3,speed:Math.random()*0.14+0.03,opacity:Math.random()*0.45+0.1,ts:Math.random()*0.01+0.003,to:Math.random()*Math.PI*2}); }
let t=0;
function draw() { ctx.clearRect(0,0,W,H); t+=0.016; for(const s of stars){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(148,197,255,${Math.max(0,s.opacity+Math.sin(t*s.ts*60+s.to)*0.14)})`;ctx.fill();s.y-=s.speed;if(s.y<-2){s.y=H+2;s.x=Math.random()*W;}} requestAnimationFrame(draw); }
resize(); initStars(); draw();
window.addEventListener('resize',()=>{resize();initStars();});
</script>
</body>
</html>
